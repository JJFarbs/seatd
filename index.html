<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0B0710">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seat'd">
<title>Seat'd — Tables. Not phone calls.</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%23FF3DAE"/><stop offset="1" stop-color="%237A4DFF"/></linearGradient></defs><rect width="64" height="64" rx="15" fill="%230B0710"/><path d="M20 44 V30 a12 12 0 0 1 24 0 v14" fill="none" stroke="url(%23g)" stroke-width="7" stroke-linecap="round"/><rect x="16" y="42" width="32" height="7" rx="3.5" fill="url(%23g)"/></svg>'>
<link rel="apple-touch-icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="15" fill="%230B0710"/><path d="M20 44 V30 a12 12 0 0 1 24 0 v14" fill="none" stroke="%23FF3DAE" stroke-width="7" stroke-linecap="round"/><rect x="16" y="42" width="32" height="7" rx="3.5" fill="%23FF3DAE"/></svg>'>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --ink:#0B0710; --surface:#141019; --surface-2:#1C1626; --line:#2B2336;
    --magenta:#FF3DAE; --violet:#7A4DFF; --blue:#2BD4FF; --gold:#FFC24B; --teal:#3FE0C0;
    --txt:#F5F0FA; --muted:#9A8FB0; --ok:#3FE0A0; --warn:#FF6B6B;
    --display:'Anton','Inter',system-ui,sans-serif; --body:'Inter',system-ui,-apple-system,sans-serif;
    --shadow-card:0 4px 24px -8px rgba(0,0,0,.55);
    --shadow-pop:0 18px 50px -12px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  body{background:#050308;overscroll-behavior-y:none;}
  body,#root{background-color:#050308;}
  button{touch-action:manipulation;}

  .stage{ min-height:100vh;min-height:100dvh;width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;
    padding:20px clamp(12px,2vw,32px) 34px;font-family:var(--body);color:var(--txt);
    background:radial-gradient(900px 600px at 18% -5%,rgba(255,61,174,.20),transparent 60%),
      radial-gradient(900px 700px at 95% 8%,rgba(43,212,255,.15),transparent 55%),
      radial-gradient(700px 600px at 50% 110%,rgba(122,77,255,.18),transparent 55%),#050308; }

  .roleswitch{ display:inline-flex;background:rgba(20,16,25,.8);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px;backdrop-filter:blur(8px);max-width:100%;overflow-x:auto;scrollbar-width:none;}
  .roleswitch::-webkit-scrollbar{display:none;}
  .roleswitch button{ font-weight:600;font-size:12.5px;color:var(--muted);background:transparent;border:0;cursor:pointer;padding:10px 16px;min-height:40px;border-radius:999px;transition:.2s;font-family:var(--body);white-space:nowrap;}
  .roleswitch button.on{ color:#0B0710;background:linear-gradient(120deg,var(--magenta),var(--violet)); }
  .hint{ font-size:12px;color:var(--muted);max-width:420px;text-align:center;line-height:1.5;padding:0 8px;}
  .hint b{ color:var(--magenta); }

  /* ---- App shell: fluid, no fake phone frame ---- */
  .phone{ width:min(1180px,100%);height:min(900px,calc(100dvh - 128px));min-height:480px;flex:none;position:relative;
    background:rgba(11,7,16,.74);border:1px solid rgba(255,255,255,.08);border-radius:28px;overflow:hidden;
    box-shadow:0 30px 90px -35px rgba(255,61,174,.45),0 24px 80px -35px rgba(43,212,255,.32);}
  .screen{ position:relative;width:100%;height:100%;background:linear-gradient(180deg,rgba(20,16,25,.94),rgba(11,7,16,.98));border-radius:28px;overflow:hidden;display:flex;flex-direction:column;}
  .body{ flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  .body::-webkit-scrollbar{ width:5px;} .body::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  .pad{ padding:24px clamp(16px,3vw,42px) 34px;max-width:920px;margin:0 auto;width:100%;}

  .eyebrow{ font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--magenta);font-weight:700;}
  .h1{ font-family:var(--display);font-size:clamp(30px,4.5vw,52px);line-height:.98;letter-spacing:.01em;text-transform:uppercase;overflow-wrap:break-word;}
  .h2{ font-family:var(--display);font-size:clamp(21px,2.6vw,30px);letter-spacing:.02em;text-transform:uppercase;overflow-wrap:break-word;}
  .sub{ color:var(--muted);font-size:14px;line-height:1.55;}
  .logo{ font-family:var(--display);text-transform:uppercase;letter-spacing:.01em;
    background:linear-gradient(110deg,var(--magenta),var(--violet),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .logomark{width:46px;height:46px;border-radius:13px;background:#0B0710;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none;}
  .logomark svg{width:30px;height:30px;}

  /* motion */
  @media (prefers-reduced-motion: no-preference){
    .enter{ animation:enter .34s cubic-bezier(.2,.7,.2,1) both;}
    @keyframes enter{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;}}
    .stagger>*{ animation:rise .42s cubic-bezier(.2,.7,.2,1) both;}
    .stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}
    .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}
    .stagger>*:nth-child(5){animation-delay:.22s}.stagger>*:nth-child(6){animation-delay:.27s}
    @keyframes rise{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;}}
    .glow{ animation:breathe 3.4s ease-in-out infinite;} @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}
    .pop{ animation:pop .26s cubic-bezier(.2,.8,.2,1.2) both;} @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    .beam{ animation:sweep 5s ease-in-out infinite;transform-origin:top center;} @keyframes sweep{0%,100%{opacity:.25;transform:rotate(-3deg)}50%{opacity:.6;transform:rotate(3deg)}}
    .ping{ animation:ping 1.4s ease-out infinite;} @keyframes ping{0%{transform:scale(.6);opacity:.7}100%{transform:scale(2.4);opacity:0}}
    .splash{ animation:splashfade 1.7s ease forwards;} @keyframes splashfade{0%,55%{opacity:1}100%{opacity:0;visibility:hidden}}
    .splash .logo{ animation:logoin 1.1s cubic-bezier(.2,.8,.2,1) both;} @keyframes logoin{0%{opacity:0;transform:translateY(20px) scale(.9);letter-spacing:.3em}100%{opacity:1;transform:none;letter-spacing:.01em}}
    .heartbeat{animation:heartbeat .45s cubic-bezier(.2,.8,.3,1.4);} @keyframes heartbeat{0%{transform:scale(1)}35%{transform:scale(1.45)}70%{transform:scale(.9)}100%{transform:scale(1)}}
    .card{transition:transform .2s cubic-bezier(.2,.7,.2,1),box-shadow .2s;}
    @media (hover:hover){ .card:hover{transform:translateY(-4px);box-shadow:0 16px 44px -14px rgba(255,61,174,.35),var(--shadow-card);} }
  }
  .splash{ position:absolute;inset:0;z-index:80;background:radial-gradient(600px 400px at 50% 40%,rgba(122,77,255,.35),#050308 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  .splashbar{width:120px;height:3px;border-radius:3px;background:var(--line);overflow:hidden;}
  .splashbar i{display:block;height:100%;width:40%;border-radius:3px;background:linear-gradient(90deg,var(--magenta),var(--blue));animation:loadslide 1.1s ease-in-out infinite;}
  @keyframes loadslide{0%{transform:translateX(-110%)}100%{transform:translateX(320%)}}

  /* skeletons */
  .skel{position:relative;overflow:hidden;background:var(--surface-2);border-radius:14px;}
  .skel::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.06) 50%,transparent 70%);animation:shine 1.3s infinite;}
  @keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

  /* ripple */
  .btn,.chip,.tab{position:relative;overflow:hidden;}
  .rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);animation:rip .5s ease-out forwards;pointer-events:none;}
  @keyframes rip{to{transform:scale(2.6);opacity:0;}}

  /* venue cover + cards */
  .cards{ display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;margin-top:16px;}
  .card{ position:relative;border-radius:22px;overflow:hidden;border:1px solid var(--line);cursor:pointer;box-shadow:var(--shadow-card);background:var(--surface);}
  .card:active{ transform:scale(.985);}
  .cover{ height:180px;position:relative;overflow:hidden;background:#0B0710;}
  .cover svg,.cover img.ph{ position:absolute;inset:0;width:100%;height:100%;}
  .cover img.ph{object-fit:cover;display:block;}
  .cover .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,3,8,.18) 0%,rgba(5,3,8,0) 40%,rgba(5,3,8,.78) 100%);}
  .meta{ padding:14px 16px 16px;background:var(--surface);}
  .row{ display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .genrebdg{ position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 10px;border-radius:999px;background:rgba(11,7,16,.55);backdrop-filter:blur(6px);z-index:2;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .when{ position:absolute;top:12px;right:12px;font-size:12px;font-weight:600;padding:6px 10px;border-radius:999px;background:rgba(11,7,16,.55);backdrop-filter:blur(6px);z-index:2;}
  .covtag{ position:absolute;bottom:12px;left:14px;z-index:2;max-width:calc(100% - 76px);}
  .covtag .nm{ font-family:var(--display);font-size:26px;text-transform:uppercase;text-shadow:0 2px 18px rgba(0,0,0,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .covtag .ar{ font-size:12px;font-weight:600;opacity:.92;display:flex;align-items:center;gap:5px;}
  .pricefrom{ font-size:13px;color:var(--muted);} .pricefrom b{ color:var(--txt);font-weight:700;}
  .pill{ font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;}

  /* chips / filters */
  .chips{ display:flex;gap:8px;overflow-x:auto;padding:12px 0 4px;-ms-overflow-style:none;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{ flex:none;font-size:13px;font-weight:600;padding:10px 16px;min-height:40px;display:inline-flex;align-items:center;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;transition:.18s;white-space:nowrap;}
  .chip.on{ color:#0B0710;background:linear-gradient(120deg,var(--magenta),var(--violet));border-color:transparent;}
  .locbtn{ display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--blue);background:rgba(43,212,255,.08);border:1px solid rgba(43,212,255,.3);border-radius:12px;padding:12px 14px;min-height:44px;cursor:pointer;justify-content:center;}
  .locbtn.on{ color:var(--ok);background:rgba(63,224,160,.08);border-color:rgba(63,224,160,.3);}

  /* buttons / forms */
  .btn{ display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:var(--body);font-weight:700;font-size:16px;color:#0B0710;border:0;border-radius:16px;padding:16px;min-height:52px;cursor:pointer;
    background:linear-gradient(120deg,var(--magenta),var(--violet));box-shadow:0 10px 30px -8px rgba(255,61,174,.55);transition:transform .15s,opacity .15s;}
  .btn:active{ transform:scale(.98);}
  .btn[disabled]{ opacity:.35;box-shadow:none;cursor:not-allowed;}
  .btn.ghost{ background:transparent;color:var(--txt);border:1px solid var(--line);box-shadow:none;}
  .btn.gold{ background:linear-gradient(120deg,var(--gold),#ff9d4b);box-shadow:0 10px 30px -8px rgba(255,194,75,.5);}
  .btn.sm{ padding:11px 14px;font-size:14px;min-height:44px;}
  .field{ margin-top:14px;} .field label{ display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:600;}
  .input,textarea.input{ width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;min-height:48px;color:var(--txt);font-family:var(--body);font-size:15px;resize:none;}
  .input::placeholder{ color:#5e5570;}
  .input:focus-visible,.searchbar:focus-visible{outline:2px solid var(--violet);outline-offset:1px;}
  .seg{ display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .seg .opt{ flex:1;min-width:150px;border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:.18s;}
  .seg .opt.on{ border-color:var(--magenta);background:rgba(255,61,174,.08);}
  .seg .opt .t{ font-weight:700;font-size:15px;} .seg .opt .d{ font-size:11px;color:var(--muted);margin-top:3px;}

  /* topbar / back */
  .topbar{ display:flex;align-items:center;gap:14px;padding:18px clamp(16px,3vw,42px) 6px;max-width:920px;margin:0 auto;width:100%;}
  .back{ width:44px;height:44px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}
  .back svg{width:22px;height:22px;display:block;}

  /* floor map */
  .legend{ display:flex;gap:13px;flex-wrap:wrap;margin:14px 0 6px;}
  .legend span{ display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .swatch{ width:11px;height:11px;border-radius:3px;}
  .mapwrap{ border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,#100B17,#0B0710);padding:8px;max-width:720px;margin-left:auto;margin-right:auto;}
  svg .tbl{ cursor:pointer;transition:.18s;} svg .tbl.booked{ cursor:not-allowed;}
  .bookbar{ position:absolute;left:0;right:0;bottom:0;padding:14px clamp(16px,3vw,42px) 16px;background:linear-gradient(180deg,rgba(11,7,16,0),rgba(11,7,16,.96) 28%);z-index:30;}
  .bookbar .btn{max-width:640px;margin:0 auto;}

  .summary{ background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:18px;max-width:680px;}
  .summary .li{ display:flex;justify-content:space-between;gap:12px;padding:8px 0;font-size:14px;color:var(--muted);border-bottom:1px solid rgba(43,35,54,.6);}
  .summary .li:last-child{border:0;} .summary .li b{color:var(--txt);text-align:right;}
  .summary .total{ display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;}
  .summary .total .amt{ font-family:var(--display);font-size:30px;}
  .micro{ font-size:11px;color:#6f6582;line-height:1.5;margin-top:10px;}
  .stepper{ display:flex;align-items:center;gap:14px;} .stepper button{ width:44px;height:44px;border-radius:12px;border:1px solid var(--line);background:var(--surface-2);color:var(--txt);font-size:22px;cursor:pointer;}
  .stepper .val{ font-family:var(--display);font-size:26px;min-width:30px;text-align:center;}
  .splitrow{ display:flex;gap:12px;max-width:680px;flex-wrap:wrap;} .splitrow .col{ flex:1;min-width:140px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;}

  /* status / pass */
  .center{ flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;gap:6px;}
  .spinner{ width:62px;height:62px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--magenta);animation:spin 1s linear infinite;margin-bottom:10px;} @keyframes spin{to{transform:rotate(360deg);}}
  .checkwrap{ width:84px;height:84px;border-radius:50%;background:linear-gradient(120deg,var(--magenta),var(--violet));display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px -8px rgba(255,61,174,.6);}
  .pass{ margin:8px auto 0;border-radius:24px;overflow:hidden;border:1px solid var(--line);background:var(--surface);max-width:560px;width:calc(100% - 32px);}
  .pass .head{ padding:20px;background:linear-gradient(120deg,rgba(255,61,174,.25),rgba(122,77,255,.22));}
  .pass .qr{ display:flex;justify-content:center;padding:22px;}
  .pass .qr .qrbox{background:#F5F0FA;border-radius:14px;padding:12px;display:flex;align-items:center;justify-content:center;}
  .pass .qr .qrbox img,.pass .qr .qrbox canvas{display:block;width:140px;height:140px;}
  .pass .det{ padding:0 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .pass .det .k{ font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .pass .det .v{ font-weight:700;font-size:15px;margin-top:3px;overflow-wrap:anywhere;}
  .statuschip{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;padding:7px 12px;border-radius:999px;letter-spacing:.04em;}
  .statuschip i{width:9px;height:9px;border-radius:50%;flex:none;}
  .st-confirmed{background:rgba(63,224,160,.13);color:var(--ok);} .st-confirmed i{background:var(--ok);}
  .st-pending{background:rgba(255,194,75,.13);color:var(--gold);} .st-pending i{background:var(--gold);}
  .st-cancelled{background:rgba(255,107,107,.13);color:var(--warn);} .st-cancelled i{background:var(--warn);}
  .st-checkedin{background:rgba(43,212,255,.13);color:var(--blue);} .st-checkedin i{background:var(--blue);}

  /* tabbar */
  .tabbar{ flex:none;min-height:72px;display:flex;align-items:center;justify-content:space-around;gap:4px;padding:6px clamp(4px,2vw,42px) max(6px,env(safe-area-inset-bottom));background:rgba(11,7,16,.92);border-top:1px solid var(--line);backdrop-filter:blur(10px);position:relative;z-index:90;}
  .tab{ display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:var(--muted);cursor:pointer;font-weight:600;position:relative;transition:.18s;min-width:56px;min-height:56px;padding:4px 8px;border-radius:14px;flex:1;max-width:110px;}
  .tab.on{ color:var(--magenta);} .tab svg{ width:24px;height:24px;}
  .tab .dot{ position:absolute;top:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--magenta);opacity:0;transition:.2s;}
  .tab.on .dot{ opacity:1;}
  .tab *{pointer-events:none;}
  .badge-n{ position:absolute;top:-3px;right:-8px;background:var(--magenta);color:#0B0710;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

  /* avatars */
  .av{ border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);color:#0B0710;flex:none;}
  .online{ width:11px;height:11px;border-radius:50%;background:var(--ok);border:2px solid var(--ink);position:absolute;bottom:0;right:0;}
  .pos{ position:relative;}

  /* lists rows */
  .lrow{ display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid rgba(43,35,54,.55);cursor:pointer;min-height:56px;max-width:760px;}
  .lrow .nm{ font-weight:700;font-size:15px;} .lrow .meta2{ font-size:13px;color:var(--muted);margin-top:2px;}
  .meta2{ font-size:13px;color:var(--muted);}

  /* chat */
  .chatbody{ flex:1;overflow-y:auto;padding:18px clamp(16px,3vw,42px);display:flex;flex-direction:column;gap:9px;max-width:920px;margin:0 auto;width:100%;}
  .chatbody::-webkit-scrollbar{width:0;}
  .bub{ max-width:78%;padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.4;overflow-wrap:anywhere;}
  .bub.me{ align-self:flex-end;background:linear-gradient(120deg,var(--magenta),var(--violet));color:#fff;border-bottom-right-radius:5px;}
  .bub.them{ align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:5px;}
  .composer{ flex:none;display:flex;gap:9px;padding:12px clamp(14px,3vw,42px) max(14px,env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(11,7,16,.9);}
  .composer input{ flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:12px 16px;min-height:46px;color:var(--txt);font-family:var(--body);font-size:14px;min-width:0;}
  .send{ width:48px;height:48px;border-radius:50%;border:0;background:linear-gradient(120deg,var(--magenta),var(--violet));color:#fff;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;}

  /* profile */
  .phero{ padding:30px 20px 18px;text-align:center;background:linear-gradient(180deg,rgba(122,77,255,.18),transparent);}
  .pstats{ display:flex;gap:10px;margin-top:18px;max-width:560px;margin-left:auto;margin-right:auto;}

    back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5L8 12l7 7"/></svg>',
    arrow:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
    pencil:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L19 9l-4-4L4 16v4zM14 6l4 4"/></svg>',
    share:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>',
  };
  const logoMark=`<svg viewBox="0 0 64 64" aria-hidden="true"><defs><linearGradient id="lm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF3DAE"/><stop offset="1" stop-color="#7A4DFF"/></linearGradient></defs><path d="M20 44 V30 a12 12 0 0 1 24 0 v14" fill="none" stroke="url(#lm)" stroke-width="7" stroke-linecap="round"/><rect x="16" y="42" width="32" height="7" rx="3.5" fill="url(#lm)"/></svg>`;
  const emptyArt=`<svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="34" stroke="#2B2336" stroke-width="2" stroke-dasharray="5 6"/><path d="M28 52 V36 a12 12 0 0 1 24 0 v16" stroke="#FF3DAE" stroke-width="4" stroke-linecap="round" opacity=".8"/><rect x="24" y="50" width="32" height="5" rx="2.5" fill="#7A4DFF" opacity=".8"/><circle cx="58" cy="24" r="3" fill="#2BD4FF" opacity=".7"/><circle cx="22" cy="20" r="2" fill="#FFC24B" opacity=".7"/></svg>`;
  function emptyState(text){ return `<div class="empty">${emptyArt}${text}</div>`; }
  function statusChip(st){
    const map={confirmed:['st-confirmed','Confirmed'],pending:['st-pending','Waiting for payments'],cancelled:['st-cancelled','Cancelled'],rejected:['st-cancelled','Declined'],checkedin:['st-checkedin','Checked in']};
    const m=map[st]||map.pending;
    return `<span class="statuschip ${m[0]}"><i></i>${m[1]}</span>`;
  }
  function offlineBar(){ return S.offline?`<div class="offlinebar">You're offline — showing cached demo data. Payments are paused.</div>`:''; }

  // ---------- AUTH ----------

    if(S.screen==='signup') return signupScreen();

        <div class="logomark" style="width:66px;height:66px;border-radius:18px">${logoMark}</div>
        <div class="logo" style="font-size:64px">Seat'd</div>
        <div class="sub" style="letter-spacing:.18em;text-transform:uppercase;font-size:12px">Tables. Not phone calls.</div>
        <div class="splashbar"><i></i></div>
      </div>
      <div class="body enter"><div class="pad" style="display:flex;flex-direction:column;height:100%;justify-content:flex-end;padding-bottom:36px;min-height:560px">
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
          <div style="display:flex;align-items:center;gap:14px"><div class="logomark">${logoMark}</div><div class="logo h1" style="font-size:clamp(44px,7vw,64px)">Seat'd</div></div>

      </div></div>`;
  }
  function signupScreen(){
    const roles=[['user','Going out','Find clubs & book tables'],['club','I run a venue','List events, take bookings'],['admin','Platform admin','Approve clubs, oversee city']];
    const ok=S.auth.name.trim().length>1;
    return `<div class="topbar"><button class="back" data-act="auth-back" aria-label="Back">${ic.back}</button><div class="h2">Create account</div></div>
      <div class="body enter"><div class="pad">
        <div class="sub">Who are you on Seat'd?</div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px;max-width:680px">
          ${roles.map(r=>`<div class="seg" style="margin:0"><div class="opt ${S.signupRole===r[0]?'on':''}" data-srole="${r[0]}" style="text-align:left;flex:1;display:flex;align-items:center;gap:12px">
            <div style="width:34px;height:34px;border-radius:10px;background:rgba(255,61,174,.12);display:flex;align-items:center;justify-content:center;color:var(--magenta)">${r[0]==='user'?ic.user:r[0]==='club'?ic.store:ic.chart}</div>
            <div><div class="t">${r[1]}</div><div class="d">${r[2]}</div></div></div></div>`).join('')}
        </div>
        <div style="max-width:680px">
        <div class="field"><label>Full name</label><input class="input" id="f-name" placeholder="Your name" value="${esc(S.auth.name)}"></div>
        <div class="field"><label>${S.signupRole==='club'?'Venue name':'Username'}</label><input class="input" id="f-handle" placeholder="${S.signupRole==='club'?'e.g. Cobalt Room':'@you'}" value="${esc(S.auth.handle)}"></div>
        <div class="field"><label>Email</label><input class="input" id="f-email" type="email" placeholder="you@email.com" value="${esc(S.auth.email)}"></div>
        <button class="btn" style="margin-top:22px" data-act="finish-signup" ${ok?'':'disabled'}>Create ${S.signupRole} account</button>
        ${S.signupRole==='club'?`<div class="micro" style="text-align:center">Clubs go live once a Seat'd admin approves your venue.</div>`:''}
        </div>
      </div></div>`;

  // ---------- PUBLIC TABLES ----------
  function joinersHTML(pt){
    const js=(pt.joiners||[]).filter(j=>j.status==='approved');
    if(!js.length) return '<div class="meta2" style="margin-top:8px">No outside joiners approved yet.</div>';
    return `<div class="joiners">${js.map(j=>`<span class="miniav">${esc((j.name||'?')[0])}</span>`).join('')}<span class="meta2">${js.length} joined — ${fmt(js.reduce((a,j)=>a+(j.amount||publicJoinPrice(pt,j.gender)||0),0))} recovered</span></div>`;
  }
  function publicTableCard(pt,mode){
    const requested=(pt.joinRequests||[]).some(j=>j.userId==='me'&&j.status==='pending');
    const joined=(pt.joiners||[]).some(j=>j.id==='me');
    const mPrice=publicJoinPrice(pt,'male'), fPrice=publicJoinPrice(pt,'female'), spots=publicSpotsOpen(pt);
    const joinBtns = spots<=0 ? `<button class="btn sm ghost" style="margin-top:13px" disabled>Table full</button>` : requested||joined
      ? `<button class="btn sm" style="margin-top:13px" disabled>${joined?'Already joined':'Request sent'}</button>`
      : `<div class="splitrow" style="margin-top:13px"><button class="btn sm" style="flex:1" data-joinpublic="${pt.id}:male">Join as male — ${fmt(mPrice)}</button><button class="btn sm ghost" style="flex:1" data-joinpublic="${pt.id}:female">Join as female — ${fmt(fPrice)}</button></div>`;
    return `<div class="publiccard">
      <div class="row"><div><div class="eyebrow" style="color:var(--teal)">Open table</div><div class="nm" style="font-size:17px;font-weight:800">${esc(pt.venue)} — ${esc(pt.table)}</div><div class="meta2">Hosted by ${esc(pt.owner)} · ${tierMeta[pt.tier]?.label||'Table'} · ${spots} spots open</div></div><span class="badge" style="background:rgba(63,224,192,.14);color:var(--teal)">M ${fmt(mPrice)} / F ${fmt(fPrice)}</span></div>
      ${joinersHTML(pt)}
      ${mode==='owner'?ownerPublicControls(pt):joinBtns}
    </div>`;
  }
  function ownerPublicControls(pt){
    const pending=(pt.joinRequests||[]).filter(j=>j.status==='pending');
    return `<div style="margin-top:12px">
      <div class="splitrow">
        <div class="field" style="margin-top:0;flex:1"><label>Male join price</label><input class="input" id="pub-male-price-${pt.id}" inputmode="numeric" value="${publicJoinPrice(pt,'male')}"></div>
        <div class="field" style="margin-top:0;flex:1"><label>Female join price</label><input class="input" id="pub-female-price-${pt.id}" inputmode="numeric" value="${publicJoinPrice(pt,'female')}"></div>
      </div>
      <button class="btn sm ghost" style="margin-top:8px" data-savepubprice="${pt.id}">Save join prices</button>
      <div class="eyebrow" style="margin-top:14px;color:var(--gold)">Join requests</div>
      ${pending.length?pending.map(j=>`<div class="joinreq"><div><div style="font-weight:800;font-size:13px">${esc(j.name)}</div><div class="meta2">${esc((j.gender||'male'))} · wants to join for ${fmt(j.amount||publicJoinCharge(pt,j.gender))}</div></div><div style="display:flex;gap:8px"><button class="btn sm" style="width:auto;padding:8px 12px" data-approvejoin="${pt.id}:${j.id}">Approve</button><button class="btn sm ghost" style="width:auto;padding:8px 12px" data-denyjoin="${pt.id}:${j.id}">Deny</button></div></div>`).join(''):'<div class="meta2" style="margin-top:8px">No pending join requests.</div>'}
    </div>`;
  }
  function deadlineHTML(r,who){ if(r.status!=='pending'||!r.deadlineMs||allPaid(r)) return ''; const danger=timeLeftMs(r)<=5*60000; return `<div class="timerbox ${danger?'danger':''}" data-timerbox="${r.id}"><div><div style="font-weight:800;font-size:14px">${who==='club'?'Payment window':'Complete payment window'}</div><div class="meta2">Auto-cancels unless every invited person pays in 20 minutes.</div></div><div class="time" data-timer="${r.id}">${timeLeftText(r)}</div></div>`; }
  function paymentRowsHTML(r,editable){ const ps=r.payments||[]; if(!ps.length)return ''; return `<div style="margin-top:14px;text-align:left"><div class="eyebrow" style="color:var(--teal)">Payment pings</div>${ps.map(p=>`<div class="payreq ${p.status==='paid'?'paid':''}"><div class="left"><div>${p.id==='host'?av(people.me,32):(people[p.id]?av(people[p.id],32):'<div class="av" style="width:32px;height:32px;font-size:14px;background:linear-gradient(135deg,var(--blue),var(--violet))">?</div>')}</div><div><div class="who">${esc(p.name)}</div><div class="due">${fmt(r&&r.status!=='pending'?adjustedShareAmount(p,r):p.amount)} — ${p.status==='paid'?'paid':'waiting for payment'}</div></div></div>${editable&&p.status!=='paid'?`<button class="btn sm ghost" style="width:auto;padding:8px 12px" data-payfriend="${p.id}">Mark paid</button>`:`<span class="badge" style="background:${p.status==='paid'?'rgba(63,224,160,.15)':'rgba(255,194,75,.14)'};color:${p.status==='paid'?'var(--ok)':'var(--gold)'}">${p.status==='paid'?'PAID':'PINGED'}</span>`}</div>`).join('')}</div>`; }

  // ---------- DISCOVER ----------
  function discover(){
    let list=venues.filter(v=>v.status==='live');
    if(S.showFavs) list=list.filter(v=>S.favs.includes(v.id));
    if(S.area!=='All') list=list.filter(v=>v.area===S.area);
    if(S.genre!=='All') list=list.filter(v=>(v.genre||'').toLowerCase().includes(S.genre.toLowerCase()));
    const res=searchClubs(list,S.clubSearch);
    list=res.hits;
    if(S.nearMe) list=[...list].sort((a,b)=>a.dist-b.dist);
    const cards=list.map(v=>clubCard(v)).join('') || emptyState(`<b style="color:var(--txt)">No clubs found</b><br>Nothing matches "${esc(S.clubSearch||S.genre||S.area)}". Try another name, area or genre.`);
    const fuzzyNote=res.fuzzy&&list.length?`<div class="meta2" style="margin-top:14px">No exact match for “${esc(S.clubSearch)}” — showing the closest matches:</div>`:'';
    const pts=openPublicTables().filter(pt=>S.area==='All'||(venue(pt.vid)&&venue(pt.vid).area===S.area));
    return `${offlineBar()}<div class="body enter"><div class="pad">
        <div class="eyebrow">Out tonight — Joburg</div><div class="h1">Find your<br>table</div>
        <input class="searchbar" id="club-search" type="search" placeholder="Search clubs, areas, music..." value="${esc(S.clubSearch)}" style="margin-top:14px">
        <div class="chips">${AREAS.map(a=>`<div class="chip ${S.area===a?'on':''}" data-area="${a}">${a}</div>`).join('')}</div>
        <div class="chips" style="padding-top:0">${GENRES.map(g=>`<div class="chip ${S.genre===g?'on':''}" data-genre="${g}">${g}</div>`).join('')}</div>
        <div class="wideactions"><button class="locbtn ${S.nearMe?'on':''}" data-act="near" style="flex:1;min-width:200px">${ic.pin}${S.nearMe?'Sorted by distance from Sandton':"Sort by what's near me"}</button>
        <button class="btn ghost sm" style="min-width:150px" data-act="show-favs"><span style="color:var(--magenta);display:inline-flex;width:18px;height:18px">${ic.heart}</span>${S.showFavs?'Show all clubs':`Favourites (${S.favs.length})`}</button></div>
        ${pts.length?`<div class="eyebrow" style="margin-top:20px;color:var(--teal)">Join an open table</div>${pts.map(pt=>publicTableCard(pt,'join')).join('')}`:''}
        <div class="eyebrow" style="margin-top:20px">${S.showFavs?'Your favourites':'Book your own table'}</div>
        ${fuzzyNote}
        <div class="cards stagger">${cards}</div>
      </div></div>${tabbar()}`;
  }
  function clubCard(v){
    return `<div class="card" data-venue="${v.id}">
        <div class="cover">${coverHTML(v,180)}
          <span class="genrebdg">${esc(v.genre)}</span><span class="when">${esc(v.when)}</span>
          ${favBtn(v.id)}
          <div class="covtag"><div class="nm">${esc(v.name)}</div><div class="ar">${ic.pin}${esc(v.area)}${S.nearMe?` — ${v.dist} km`:''}</div></div>
        </div>
        <div class="meta"><div class="row"><div style="min-width:0"><div class="sub" style="font-size:13px">${esc(v.tagline)}</div><div style="margin-top:7px">${starRating(v)}</div></div>
          <div class="pricefrom" style="text-align:right">from<br><b>${fmt(v.minFrom)}</b></div></div>${availabilityHTML(v.id)}</div>
      </div>`;
  }
  function venuesMap(){
    const live=venues.filter(v=>v.status==='live');
    return `${offlineBar()}<div class="body enter"><div class="pad">
      <div class="h1" style="font-size:28px">Map</div>
      <div class="mapwrap" style="margin-top:14px;height:250px;position:relative;background:linear-gradient(160deg,#100B17,#0B0710)">
        <svg viewBox="0 0 340 230" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
          <path d="M20 120 H320 M170 20 V210 M60 60 L300 180" stroke="#241d30" stroke-width="2" fill="none"/>
          ${live.map((v,i)=>{const x=50+(v.dist*9)%260,y=40+(i*38)%160;return`<g class="mappin" data-venue="${v.id}" style="cursor:pointer"><circle class="ping" cx="${x}" cy="${y}" r="8" fill="${v.g[0]}"/><circle cx="${x}" cy="${y}" r="7" fill="${v.g[0]}"/><text x="${x+12}" y="${y+4}" font-family="Inter" font-size="10" font-weight="700" fill="#F5F0FA">${esc(v.name)}</text></g>`;}).join('')}
          <circle cx="170" cy="120" r="6" fill="#fff"/><circle class="ping" cx="170" cy="120" r="6" fill="#fff"/>
          <text x="170" y="146" text-anchor="middle" font-family="Inter" font-size="9" fill="#9A8FB0">You — Sandton</text>
        </svg>
      </div>
      <div class="stagger" style="margin-top:16px">
        ${[...live].sort((a,b)=>a.dist-b.dist).map(v=>`<div class="lrow" data-venue="${v.id}" style="border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-top:10px;max-width:none">
          ${thumbHTML(v,44)}
          <div style="flex:1;min-width:0"><div class="nm">${esc(v.name)}</div><div class="meta2">${esc(v.area)} · ${v.dist} km · from ${fmt(v.minFrom)}</div></div>
          <span style="color:var(--muted)">${ic.arrow}</span></div>`).join('')}
      </div>
    </div></div>${tabbar()}`;
  }

  // ---------- VENUE DETAIL (tables / events / info / reviews) ----------
  function venueScreen(){
    const v=venue(S.venueId); if(!v) return notFound();
    const tabs=[['tables','Tables'],['events','Events'],['info','Club info'],['reviews','Reviews']];
    let inner2='';
    if(S.venueTab==='events') inner2=venueEvents(v);
    else if(S.venueTab==='info') inner2=venueInfo(v);
    else if(S.venueTab==='reviews') inner2=venueReviews(v);
    else return venueTables(v);
    return `${offlineBar()}
      <div style="position:relative"><div class="cover" style="height:130px">${coverHTML(v,130)}
        <button class="back" data-go="back-discover" style="position:absolute;top:10px;left:14px;z-index:5;background:rgba(11,7,16,.6)" aria-label="Back">${ic.back}</button>
        ${favBtn(v.id)}
        <div class="covtag"><div class="nm" style="font-size:24px">${esc(v.name)}</div><div class="ar">${esc(v.area)} · ${esc(v.genre)}</div></div></div></div>
      <div class="body"><div class="pad">
        <div class="subtabs">${tabs.map(t=>`<div class="chip ${S.venueTab===t[0]?'on':''}" data-venuetab="${t[0]}">${t[1]}</div>`).join('')}</div>
        ${inner2}
      </div></div>`;
  }
  function venueTables(v){
    const tables=tablesFor(S.venueId);
    const tEls=tables.map(t=>{const m=tierMeta[t.tier],sel=S.selTable===t.id;
      const fill=t.booked?'#241d30':(sel?m.color:'rgba(255,255,255,.04)');const stroke=t.booked?'#3a3148':m.color;
      const txtc=t.booked?'#5b5270':(sel?'#0B0710':m.color);
      return `<g class="tbl ${t.booked?'booked':''} ${(!t.booked&&!sel)?'glow':''}" data-table="${t.booked?'':t.id}">
        <rect x="${t.x}" y="${t.y}" width="${t.w}" height="${t.h}" rx="9" fill="${fill}" stroke="${stroke}" stroke-width="${sel?2.5:1.5}"></rect>
        <text x="${t.x+t.w/2}" y="${t.y+t.h/2+4}" text-anchor="middle" font-family="Anton" font-size="13" fill="${txtc}" style="pointer-events:none">${t.id}</text></g>`;}).join('');
    const sel=tables.find(t=>t.id===S.selTable);
    const bar=sel?`<div class="bookbar"><div style="max-width:640px;margin:0 auto"><div class="row" style="margin-bottom:12px"><div>
        <div style="font-weight:700;font-size:16px">${tierMeta[sel.tier].label} — ${sel.id}</div>
        <div class="sub" style="font-size:13px">Seats ${sel.seats} · min spend ${fmt(sel.min)}</div></div>
        <div class="pill" style="background:${tierMeta[sel.tier].color};color:#0B0710">Selected</div></div>
        <button class="btn" data-go="booking">Continue to payment</button></div></div>`
      :`<div class="bookbar"><div class="sub" style="text-align:center;padding-bottom:6px">Tap an available table to book it</div></div>`;
    const tabs=[['tables','Tables'],['events','Events'],['info','Club info'],['reviews','Reviews']];
    return `${offlineBar()}
      <div style="position:relative"><div class="cover" style="height:130px">${coverHTML(v,130)}
        <button class="back" data-go="back-discover" style="position:absolute;top:10px;left:14px;z-index:5;background:rgba(11,7,16,.6)" aria-label="Back">${ic.back}</button>
        ${favBtn(v.id)}
        <div class="covtag"><div class="nm" style="font-size:24px">${esc(v.name)}</div><div class="ar">${esc(v.area)} · ${esc(v.genre)}</div></div></div></div>
      <div class="body"><div class="pad" style="padding-bottom:150px">
        <div class="subtabs">${tabs.map(t=>`<div class="chip ${S.venueTab===t[0]?'on':''}" data-venuetab="${t[0]}">${t[1]}</div>`).join('')}</div>
        <div class="legend">
          <span><i class="swatch" style="background:${tierMeta.vip.color}"></i>VIP</span>
          <span><i class="swatch" style="background:${tierMeta.booth.color}"></i>Booth</span>
          <span><i class="swatch" style="background:${tierMeta.std.color}"></i>Standard</span>
          <span><i class="swatch" style="background:#241d30;border:1px solid #3a3148"></i>Booked</span></div>
        <div class="mapwrap"><svg viewBox="0 0 340 360" width="100%">
          <rect x="6" y="6" width="328" height="348" rx="20" fill="none" stroke="#2B2336" stroke-width="1.5"/>
          <rect x="120" y="18" width="100" height="26" rx="8" fill="rgba(122,77,255,.18)" stroke="#7A4DFF"/><text x="170" y="35" text-anchor="middle" font-family="Anton" font-size="12" fill="#b9a6ff">DJ BOOTH</text>
          <rect x="92" y="110" width="156" height="160" rx="14" fill="url(#dance)"/><text x="170" y="195" text-anchor="middle" font-family="Anton" font-size="13" fill="rgba(245,240,250,.55)">DANCE FLOOR</text>
          <rect x="300" y="250" width="28" height="96" rx="8" fill="rgba(43,212,255,.12)" stroke="#2BD4FF"/><text x="314" y="300" text-anchor="middle" font-family="Anton" font-size="11" fill="#9fe9ff" transform="rotate(90 314 300)">BAR</text>
          <defs><linearGradient id="dance" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="rgba(255,61,174,.10)"/><stop offset="1" stop-color="rgba(43,212,255,.10)"/></linearGradient></defs>
          ${tEls}</svg></div>
        ${availabilityHTML(v.id)}
      </div></div>${bar}`;
  }
  function venueEvents(v){
    const evs=v.events||[];
    return `<div class="eyebrow" style="margin-top:14px">Upcoming events</div>
      ${evs.length?evs.map(e=>`<div class="eventcard"><div class="day"><div class="d1">${esc(e[0])}</div><div class="d2">This week</div></div>
        <div style="flex:1;min-width:0"><div class="enm">${esc(e[1])}</div><div class="emeta">${esc(e[2])}</div></div>
        <button class="btn sm" style="width:auto;padding:10px 16px" data-venuetab="tables">Book</button></div>`).join(''):emptyState('No events listed yet.')}`;

  function venueInfo(v){

  function bookingLink(r){ return 'https://seatd.app/booking/'+encodeURIComponent(r.code||r.id); }
  function qrPayload(r){ return JSON.stringify({ref:r.code||r.id,club:r.venue,date:r.date||todayStr(),table:r.table}); }
  function qrBlock(r){ return `<div class="qr"><div class="qrbox" data-qr="${esc(qrPayload(r))}"><svg width="140" height="140" viewBox="0 0 120 120">${fauxQR()}</svg></div></div>`; }
  function fauxQR(){ let s='',v=7; for(let y=0;y<10;y++)for(let x=0;x<10;x++){v=(v*1103515245+12345)&0x7fffffff;if(v%3===0)s+=`<rect x="${10+x*10}" y="${10+y*10}" width="9" height="9" fill="#0B0710"/>`;}
    return `<rect width="120" height="120" rx="8" fill="#F5F0FA"/>`+s+`<rect x="10" y="10" width="28" height="28" fill="none" stroke="#0B0710" stroke-width="4"/><rect x="82" y="10" width="28" height="28" fill="none" stroke="#0B0710" stroke-width="4"/><rect x="10" y="82" width="28" height="28" fill="none" stroke="#0B0710" stroke-width="4"/>`; }

      <div class="sub" style="font-size:12px;margin-top:18px;opacity:.75;text-align:center">Demo: tap Mark paid to simulate friends paying, or switch to <b style="color:var(--magenta)">Club</b> to approve.</div></div></div>${tabbar()}`;

      <div class="h2" style="margin-top:12px">Booking cancelled</div><div style="margin-top:8px">${statusChip('cancelled')}</div><div class="sub" style="max-width:280px;margin-top:8px">${esc(r.cancelReason||'Not everyone paid within 20 minutes.')} Any paid shares are refunded and the table released.</div>

    const p=people[S.viewFriend]; if(!p) return friendsScreen();
    const isFriend=S.friends.includes(p.id);
    const theirBookings=S.requests.filter(r=>r.who===p.name || (r.payments||[]).some(x=>x.id===p.id));
    const theirReviews=[]; venues.forEach(v=>(v.reviews||[]).forEach(r=>{ if(r.name===p.name) theirReviews.push({...r,venue:v.name}); }));

      try{ el.innerHTML=''; new QRCode(el,{text:el.dataset.qr,width:140,height:140,colorDark:'#0B0710',colorLight:'#F5F0FA',correctLevel:QRCode.CorrectLevel.M}); el.dataset.qrDone='1'; }catch(_e){}
    });

  const chartInstances=[];
  function initCharts(){
    if(!window.Chart) return;
    while(chartInstances.length){ try{chartInstances.pop().destroy();}catch(_e){} }

      if(!text){ toast('Write a few words first'); return; }
      v.reviews=v.reviews||[]; v.reviews.unshift({name:people.me.name,stars:S.myStars,text,date:todayStr()});
      notify('heart',`You rated ${v.name} ${S.myStars}/5.`);
      toast('Review posted — rating updated'); render(); return;}
    if(a==='confirm-joinpay'){confirmJoinPayment();return;}
    if(a==='resolve-reports'){S.reports=S.reports.map(r=>({...r,status:'resolved'}));render();return;}
    if(a==='suspend-demo'){const v=venues.find(x=>x.id==='v5'); if(v)v.status=v.status==='suspended'?'live':'suspended'; render();return;}
  }
  function addFriendFromInput(){
    const i=root.querySelector('#friend-in'); const raw=(i&&i.value?i.value.trim():''); if(!raw){toast('Type a name first');return;}
    const id='p'+Date.now(); const clean=raw.startsWith('@')?raw.slice(1):raw;
    people[id]={id,name:clean.replace(/^./,c=>c.toUpperCase()),handle:raw.startsWith('@')?raw:'@'+clean.toLowerCase().replace(/\s+/g,''),g:['#2BD4FF','#7A4DFF'],online:false};
    S.friends.push(id); if(S.screen==='booking')S.invited.push(id); S.friendDraft=''; toast(`${people[id].name} added`); render();
  }
  function sendBookingInvite(key){
    const parts=String(key).split(':'), bid=parts[0], uid=parts[1];
    const r=S.requests.find(x=>x.id===bid); if(!r)return;
    let id=uid;
    if(uid==='new'){
      const raw=(S.shareDraft||'').trim(); if(!raw){toast('Type a name or @handle first');return;}
      const clean=raw.startsWith('@')?raw.slice(1):raw;
      id='p'+Date.now();
      people[id]={id,name:clean.replace(/^./,c=>c.toUpperCase()),handle:raw.startsWith('@')?raw:'@'+clean.toLowerCase().replace(/\s+/g,''),g:['#2BD4FF','#7A4DFF'],online:false};
      if(!S.friends.includes(id))S.friends.push(id);
    }
    const p=people[id]; if(!p)return;
    S.convos[id]=S.convos[id]||[];
    S.convos[id].push({f:'me',t:`Seat'd invite: join my table at ${r.venue} (${r.table}). Booking ref ${r.code||r.id}. Link: ${bookingLink(r)}`});
    if(!S.friends.includes(id))S.friends.push(id);
    S.shareSent=bid; S.shareDraft=''; render();
  }
  function makePublic(bookingId){
    const r=S.requests.find(x=>x.id===bookingId); if(!r)return;
    if(!publicTableForBooking(bookingId)){
      const limit=tableSeatLimitBy(r.vid,r.table)||8; const open=Math.max(0,limit-((r.men||0)+(r.women||0)));
      S.publicTables.unshift({id:'pub'+Date.now(),bookingId:r.id,venue:r.venue,vid:r.vid,table:r.table,tier:r.tier,owner:people.me.name,ownerId:'me',malePrice:Math.ceil((r.total||r.min||0)/4),femalePrice:Math.ceil((r.total||r.min||0)/5),price:Math.ceil((r.total||r.min||0)/4),seatsOpen:open,status:'open',joinRequests:open>0?[{id:'jr'+Date.now(),userId:'p5',name:'Jay R.',gender:'male',amount:Math.ceil((r.total||r.min||0)/4),status:'pending'}]:[],joiners:[]});
      notify('ticket',`Your table ${r.table} at ${r.venue} is now public.`);
    }
    render();
  }
  function savePublicPrice(id){
    const pt=S.publicTables.find(x=>x.id===id); if(!pt)return;
    const male=root.querySelector('#pub-male-price-'+id), female=root.querySelector('#pub-female-price-'+id);
    const mVal=parseInt((male&&male.value||'').replace(/\D/g,''),10);
    const fVal=parseInt((female&&female.value||'').replace(/\D/g,''),10);
    if(mVal>0){ pt.malePrice=mVal; pt.price=mVal; }
    if(fVal>0) pt.femalePrice=fVal;
    toast('Join prices saved'); render();
  }
  function requestJoinPublic(key){
    const [id,genderRaw]=String(key).split(':');
    const gender=genderRaw==='female'?'female':'male';
    const pt=S.publicTables.find(x=>x.id===id); if(!pt)return;
    if(publicSpotsOpen(pt)<=0){ toast('Table just filled up'); render(); return; }
    if((pt.joinRequests||[]).some(j=>j.userId==='me'&&j.status==='pending') || (pt.joiners||[]).some(j=>j.id==='me')){ render(); return; }
    S.activeJoin={ptId:id,gender};
    S.screen='joinpay';
    render();
  }
  function confirmJoinPayment(){
    if(!S.activeJoin)return;
    const {ptId,gender}=S.activeJoin;
    const pt=S.publicTables.find(x=>x.id===ptId); if(!pt)return;
    pt.joinRequests=pt.joinRequests||[];
    if(publicSpotsOpen(pt)<=0){ S.activeJoin=null; S.screen='home'; toast('Table just filled up — refunded'); render(); return; }
    const amount=publicJoinPrice(pt,gender);
    if(!pt.joinRequests.some(j=>j.userId==='me'&&j.status==='pending') && !(pt.joiners||[]).some(j=>j.id==='me')){
      pt.joinRequests.push({id:'jr'+Date.now(),userId:'me',name:people.me.name,gender,amount,subtotal:amount,serviceFee:serviceFee(amount),total:withServiceFee(amount),status:'pending'});
      notify('ticket',`Join request sent for ${pt.venue} ${pt.table}.`);
    }
    S.activeJoin=null;
    S.screen='home'; S.tab='discover';
    toast('Paid — waiting for host approval'); render();
  }
  function decideJoin(key,ok){
    const [ptid,jrid]=key.split(':'); const pt=S.publicTables.find(x=>x.id===ptid); if(!pt)return;
    const j=(pt.joinRequests||[]).find(x=>x.id===jrid); if(!j)return;
    if(ok){ if(publicSpotsOpen(pt)<=0){ toast('No seats left'); render(); return; } j.status='approved'; pt.joiners=pt.joiners||[]; if(!pt.joiners.some(x=>x.id===j.userId)) pt.joiners.push({id:j.userId,name:j.name,gender:j.gender,amount:j.amount||publicJoinCharge(pt,j.gender),status:'approved'}); pt.seatsOpen=publicSpotsOpen(pt); notify('user',`${j.name} joined your table ${pt.table} at ${pt.venue}.`); }
    else j.status='denied';
    render();
  }
  function go(to){
    if(to==='submit'){const t=tablesFor(S.venueId).find(x=>x.id===S.selTable),v=venue(S.venueId);
      if(!t||!v){S.screen='home';render();return;}
      if((S.men+S.women)>t.seats){S.screen='booking';render();return;}
      readPromo();
      const id='r'+Date.now();
      const m=bookingMath(t);
      const payments=splitPaymentsFor(t);
      const req={id,venue:v.name,vid:v.id,table:t.id,tier:t.tier,men:S.men,women:S.women,total:m.chargeTotal,subtotal:m.groupTotal,serviceFee:m.fee,paidNow:payments[0].amount,min:t.min,status:'pending',deadlineMs:Date.now()+20*60*1000,code:refCode(t.tier),who:'You',t:'just now',date:todayStr(),invited:S.splitPay?S.invited.slice():[],splitPay:S.splitPay,promo:S.promoterCode,payments};
      S.requests.unshift(req);
      sendPaymentPings(req);
      notify('ticket',`Payment received for ${v.name} ${t.id} — ref ${req.code}.`);
      S.activeReq=id;S.screen='status';render();return;}
    if(to==='back-discover'){S.screen='home';S.tab='discover';S.venueTab='tables';render();return;}
    if(to==='venue'){S.screen='venue';render();return;}
    if(to==='booking'){S.screen='booking';S.friendDraft='';render();return;}
    if(to==='pay'){const t=S.venueId&&S.selTable?tablesFor(S.venueId).find(x=>x.id===S.selTable):null; if(t&&(S.men+S.women)>t.seats){S.screen='booking';render();return;} S.screen='pay';render();return;}
    S.screen=to;render();
  }
  function decide(id,status){const r=S.requests.find(x=>x.id===id);if(!r)return;if(status==='confirmed'&&!allPaid(r))return;r.status=status;
    if(status==='confirmed'&&r.vid&&S.tables[r.vid]){const tt=S.tables[r.vid].find(x=>x.id===r.table);if(tt)tt.booked=true; notify('check',`${r.venue} confirmed table ${r.table} — ref ${r.code}.`);}
    if(status==='rejected') notify('ticket',`${r.venue} declined ${r.table}. ${fmt(r.paidNow||r.total)} refunded.`);
    render();}
  function approveClub(id){const v=S.pendingClubs.find(x=>x.id===id);if(!v)return;v.status='live';v.when='This weekend';venues.push(v);S.pendingClubs=S.pendingClubs.filter(x=>x.id!==id);S.clubVenueId=id;notify('store',`${v.name} is now live on Seat'd.`);render();}
  function send(){const i=root.querySelector('#msg-in');if(!i||!i.value.trim())return;const id=S.activeChat;
    (S.convos[id]=S.convos[id]||[]).push({f:'me',t:i.value.trim()});i.value='';render();
    setTimeout(()=>{const replies=['hahahaha','say lessss','booking it now','where you sitting?','pulling up'];
      (S.convos[id]=S.convos[id]||[]).push({f:'them',t:replies[Math.floor(Math.random()*replies.length)]});
      if(S.activeChat===id&&S.screen==='chat')render();},1300);}
  function scanNext(){
    const v=clubVenue();
    let r=S.requests.find(x=>x.vid===v.id&&x.status==='confirmed')||S.requests.find(x=>x.status==='confirmed');
    if(r){ r.status='checkedin'; S.scannerResult=r.code||r.id; notify('check',`${r.who} checked in at ${r.venue} — ${r.table}.`); }
    else { S.scannerResult=null; toast('No confirmed passes left to scan'); }
    render();
  }
  function nativeShare(r){
    const data={title:"Seat'd booking",text:`Join my table at ${r.venue} (${r.table}) — ref ${r.code}`,url:bookingLink(r)};
    if(navigator.share){ navigator.share(data).catch(()=>{}); }
    else copyText(`${data.text} ${data.url}`,'Share not supported — link copied instead');
  }

  // ---------- ONE DELEGATED CLICK HANDLER ----------
  root.addEventListener('click',function(e){
    const hit=sel=>e.target.closest(sel); let el;
    if((el=hit('[data-setrole]'))){ setRole(el.dataset.setrole); return; }
    if((el=hit('[data-star]'))){ S.myStars=parseInt(el.dataset.star,10)||5; const pick=el.closest('.starpick'); if(pick){ pick.querySelectorAll('button').forEach((b,i)=>{ const svg=b.querySelector('svg'); if(svg) svg.setAttribute('fill', i<S.myStars?'#FFC24B':'none'); }); } return; }
    if((el=hit('[data-fav]'))){ const id=el.dataset.fav; const adding=!S.favs.includes(id);
      S.favs=adding?S.favs.concat(id):S.favs.filter(x=>x!==id);
      toast(adding?'Added to favourites':'Removed from favourites');
      render();
      const nb=root.querySelector(`[data-fav="${id}"]`); if(nb) nb.classList.add('heartbeat');
      return; }
    if((el=hit('[data-venuetab]'))){ S.venueTab=el.dataset.venuetab; render(); return; }
    if((el=hit('[data-legal]'))){ S.legalPage=el.dataset.legal; S.screen='legal'; render(); return; }
    if((el=hit('[data-friendprofile]'))){ S.viewFriend=el.dataset.friendprofile; S.tab='messages'; S.screen='friendprofile'; render(); return; }
    if((el=hit('[data-invitefriend]'))){ const p=people[el.dataset.invitefriend]; if(p){ const link=`https://seatd.app/u/${p.handle.replace('@','')}`; if(navigator.share){navigator.share({title:"Seat'd",text:`Add ${p.name} on Seat'd`,url:link}).catch(()=>{});} else copyText(link,'Invite link copied'); } return; }
    if((el=hit('[data-copyinvite]'))){ const p=people[el.dataset.copyinvite]; if(p) copyText(`https://seatd.app/u/${p.handle.replace('@','')}`,'Invite link copied'); return; }
    if((el=hit('[data-nativeshare]'))){ const r=S.requests.find(x=>x.id===el.dataset.nativeshare); if(r) nativeShare(r); return; }
    if((el=hit('[data-copybooking]'))){ const r=S.requests.find(x=>x.id===el.dataset.copybooking); if(r){ copyText(bookingLink(r),'Booking link copied'); S.shareSent=el.dataset.copybooking; render(); } return; }
    if((el=hit('[data-sendbooking]'))){ sendBookingInvite(el.dataset.sendbooking); return; }
    if((el=hit('[data-sendbookingnew]'))){ sendBookingInvite(el.dataset.sendbookingnew+':new'); return; }
    if((el=hit('[data-genre]'))){ S.genre=el.dataset.genre; render(); return; }
    if((el=hit('[data-area]'))&&!hit('[data-sarea]')){ S.area=el.dataset.area; render(); return; }
    if((el=hit('[data-sarea]'))){ clubVenue().area=el.dataset.sarea; render(); return; }
    if((el=hit('[data-scan]'))){ scanNext(); return; }
    if((el=hit('[data-clubselect]'))){ S.clubVenueId=el.dataset.clubselect; render(); return; }
    if((el=hit('[data-clubreq]'))){ S.clubRequestVenueId=el.dataset.clubreq; render(); return; }
    if((el=hit('[data-clubtab]'))){ S.tab=el.dataset.clubtab; S.screen='home'; render(); return; }
    if((el=hit('[data-tab]'))){ S.tab=el.dataset.tab; S.screen='home'; S.showFavs=false; render(); return; }
    if((el=hit('[data-acc]'))){ decide(el.dataset.acc,'confirmed'); return; }
    if((el=hit('[data-rej]'))){ decide(el.dataset.rej,'rejected'); return; }
    if((el=hit('[data-capprove]'))){ approveClub(el.dataset.capprove); return; }
    if((el=hit('[data-creject]'))){ S.pendingClubs=S.pendingClubs.filter(v=>v.id!==el.dataset.creject); render(); return; }
    if((el=hit('[data-srole]'))){ S.signupRole=el.dataset.srole; captureSignup(); render(); return; }
    if((el=hit('[data-venue]'))){ S.venueId=el.dataset.venue; S.selTable=null; S.venueTab='tables'; S.screen='venue'; render(); return; }
    if((el=hit('.tbl[data-table]'))){ if(el.dataset.table){ S.selTable=el.dataset.table; render(); } return; }
    if((el=hit('[data-go]'))){ go(el.dataset.go); return; }
    if((el=hit('[data-step]'))){ const[k,d]=el.dataset.step.split(':');const nv=S[k]+parseInt(d,10);const t=S.venueId&&S.selTable?tablesFor(S.venueId).find(x=>x.id===S.selTable):null;const total=(k==='men'?nv+S.women:nv+S.men);if(nv>=0&&total>=1&&(!t||total<=t.seats)){S[k]=nv;}render(); return; }
    if((el=hit('[data-chat]'))){ S.activeChat=el.dataset.chat; S.tab='messages'; S.screen='chat'; render(); return; }
    if((el=hit('[data-add]'))){ if(!S.friends.includes(el.dataset.add))S.friends.push(el.dataset.add); toast('Friend added'); render(); return; }
    if((el=hit('[data-addsearch]'))){ const id=el.dataset.addsearch;if(!S.friends.includes(id))S.friends.push(id);if(el.dataset.context==='booking'&&!S.invited.includes(id))S.invited.push(id);S.friendDraft='';render(); return; }
    if((el=hit('[data-payfriend]'))){ const card=el.closest('[data-bookingid]'); const r=(card&&S.requests.find(x=>x.id===card.dataset.bookingid))||S.requests.find(x=>x.id===S.activeReq); if(r&&r.payments){const p=r.payments.find(x=>x.id===el.dataset.payfriend); if(p){p.status='paid'; notify('check',`${p.name} paid their share for ${r.venue} ${r.table}.`);}} render(); return; }
    if((el=hit('[data-viewbooking]'))){ S.activeReq=el.dataset.viewbooking; S.screen='status'; render(); return; }
    if((el=hit('[data-makepublic]'))){ makePublic(el.dataset.makepublic); return; }
    if((el=hit('[data-savepubprice]'))){ savePublicPrice(el.dataset.savepubprice); return; }
    if((el=hit('[data-joinpublic]'))){ requestJoinPublic(el.dataset.joinpublic); return; }
    if((el=hit('[data-approvejoin]'))){ decideJoin(el.dataset.approvejoin,true); return; }
    if((el=hit('[data-denyjoin]'))){ decideJoin(el.dataset.denyjoin,false); return; }
    if((el=hit('[data-invite]'))){ const id=el.dataset.invite; S.invited=S.invited.includes(id)?S.invited.filter(x=>x!==id):S.invited.concat(id); render(); return; }
    if((el=hit('[data-act]'))){ act(el.dataset.act,el); return; }
  });

  // ---------- INPUT BINDINGS (per render) ----------
  function bindInputs(){
    const fi=root.querySelector('#friend-in'); if(fi){fi.oninput=e=>{S.friendDraft=e.target.value; const box=root.querySelector('.searchresults'); if(box) box.outerHTML=friendSearchHTML(S.friendDraft, S.screen==='booking'?'booking':'friends');}; fi.onkeydown=e=>{if(e.key==='Enter')addFriendFromInput();};}
    const cs=root.querySelector('#club-search'); if(cs){cs.oninput=e=>{S.clubSearch=e.target.value; render();};}
    const mi=root.querySelector('#msg-in'); if(mi) mi.onkeydown=e=>{if(e.key==='Enter')send();};
    root.querySelectorAll('[id^="share-in-"]').forEach(inp=>{inp.oninput=e=>{S.shareDraft=e.target.value; const card=inp.closest('[data-sharebooking]'); const box=card&&card.querySelector('.searchresults'); if(box) box.outerHTML=shareMatchesHTML(S.shareDraft, card.dataset.sharebooking);}; inp.onkeydown=e=>{if(e.key==='Enter'){const card=inp.closest('[data-sharebooking]'); if(card)sendBookingInvite(card.dataset.sharebooking+':new');}};});
  }

  // ---------- TIMERS ----------
  function updateTimerDisplays(){
    root.querySelectorAll('[data-timer]').forEach(el=>{
      const r=S.requests.find(x=>x.id===el.dataset.timer);
      if(!r) return;
      el.textContent=timeLeftText(r);
      const box=root.querySelector(`[data-timerbox="${r.id}"]`);
      if(box) box.classList.toggle('danger', timeLeftMs(r)<=5*60000);
    });
  }
  setInterval(()=>{
    if(refreshExpiries()){ render(); return; }
    updateTimerDisplays();
  },1000);

  // ---------- PWA / NETWORK ----------
  try{
    const manifest={name:"Seat'd",short_name:"Seat'd",description:'Book club tables, pay upfront, skip the queue.',start_url:'.',display:'standalone',background_color:'#0B0710',theme_color:'#0B0710',
      icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="120" fill="#0B0710"/><path d="M160 352 V240 a96 96 0 0 1 192 0 v112" fill="none" stroke="#FF3DAE" stroke-width="56" stroke-linecap="round"/><rect x="128" y="336" width="256" height="56" rx="28" fill="#7A4DFF"/></svg>'),sizes:'512x512',type:'image/svg+xml',purpose:'any'}]};
    const l=document.createElement('link'); l.rel='manifest';
    l.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));
    document.head.appendChild(l);
  }catch(_e){}
  window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); S.installEvt=e; if(S.role) render(); });
  window.addEventListener('appinstalled',()=>{ S.installEvt=null; toast("Seat'd installed — see you on the home screen"); });
  window.addEventListener('offline',()=>{ S.offline=true; render(); });
  window.addEventListener('online',()=>{ S.offline=false; toast('Back online'); render(); });

  // ---------- BOOT ----------
  render();
  setTimeout(()=>{ S.booting=false; render(); },700);
})();
</script>
</body>
