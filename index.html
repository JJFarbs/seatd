<div id="root"></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --ink:#0B0710; --surface:#141019; --surface-2:#1C1626; --line:#2B2336;
    --magenta:#FF3DAE; --violet:#7A4DFF; --blue:#2BD4FF; --gold:#FFC24B; --teal:#3FE0C0;
    --txt:#F5F0FA; --muted:#9A8FB0; --ok:#3FE0A0; --warn:#FF6B6B;
    --display:'Anton','Inter',system-ui,sans-serif; --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body,#root{background:transparent;}

  .stage{ min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;
    padding:24px 12px 48px;font-family:var(--body);color:var(--txt);
    background:radial-gradient(900px 600px at 18% -5%,rgba(255,61,174,.20),transparent 60%),
      radial-gradient(900px 700px at 95% 8%,rgba(43,212,255,.15),transparent 55%),
      radial-gradient(700px 600px at 50% 110%,rgba(122,77,255,.18),transparent 55%),#050308; }

  .roleswitch{ display:inline-flex;background:rgba(20,16,25,.8);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px;backdrop-filter:blur(8px);}
  .roleswitch button{ font-weight:600;font-size:12.5px;color:var(--muted);background:transparent;border:0;cursor:pointer;padding:8px 16px;border-radius:999px;transition:.2s;font-family:var(--body);}
  .roleswitch button.on{ color:#0B0710;background:linear-gradient(120deg,var(--magenta),var(--violet)); }
  .hint{ font-size:12px;color:var(--muted);max-width:340px;text-align:center;line-height:1.5; }
  .hint b{ color:var(--magenta); }

  .phone{ width:390px;max-width:94vw;height:824px;max-height:84vh;background:#000;border-radius:52px;padding:12px;flex:none;
    box-shadow:0 0 0 2px #2a2336,0 30px 80px -20px rgba(255,61,174,.35),0 40px 120px -30px rgba(43,212,255,.3);position:relative;}
  .screen{ position:relative;width:100%;height:100%;background:var(--ink);border-radius:42px;overflow:hidden;display:flex;flex-direction:column;}
  .notch{ position:absolute;top:0;left:50%;transform:translateX(-50%);width:128px;height:26px;background:#000;border-radius:0 0 16px 16px;z-index:60;}
  .statusbar{ height:44px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:13px;font-weight:600;z-index:40;}
  .statusbar .dots{ display:flex;gap:5px;align-items:center;opacity:.9;}

  .body{ flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .body::-webkit-scrollbar{ width:0;}
  .pad{ padding:8px 20px 28px;}

  .eyebrow{ font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--magenta);font-weight:700;}
  .h1{ font-family:var(--display);font-size:32px;line-height:.96;letter-spacing:.01em;text-transform:uppercase;}
  .h2{ font-family:var(--display);font-size:22px;letter-spacing:.02em;text-transform:uppercase;}
  .sub{ color:var(--muted);font-size:14px;line-height:1.5;}
  .logo{ font-family:var(--display);text-transform:uppercase;letter-spacing:.01em;
    background:linear-gradient(110deg,var(--magenta),var(--violet),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent;}

  /* motion */
  @media (prefers-reduced-motion: no-preference){
    .enter{ animation:enter .34s cubic-bezier(.2,.7,.2,1) both;}
    @keyframes enter{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;}}
    .stagger>*{ animation:rise .42s cubic-bezier(.2,.7,.2,1) both;}
    .stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}
    .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}
    .stagger>*:nth-child(5){animation-delay:.22s}.stagger>*:nth-child(6){animation-delay:.27s}
    @keyframes rise{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;}}
    .glow{ animation:breathe 3.4s ease-in-out infinite;} @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}
    .floorshimmer{ animation:shimmer 6s linear infinite;} @keyframes shimmer{0%{opacity:.3}50%{opacity:.6}100%{opacity:.3}}
    .pop{ animation:pop .26s cubic-bezier(.2,.8,.2,1.2) both;} @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    .beam{ animation:sweep 5s ease-in-out infinite;transform-origin:top center;} @keyframes sweep{0%,100%{opacity:.25;transform:rotate(-3deg)}50%{opacity:.6;transform:rotate(3deg)}}
    .ping{ animation:ping 1.4s ease-out infinite;} @keyframes ping{0%{transform:scale(.6);opacity:.7}100%{transform:scale(2.4);opacity:0}}
    .splash{ animation:splashfade 1.7s ease forwards;} @keyframes splashfade{0%,55%{opacity:1}100%{opacity:0;visibility:hidden}}
    .splash .logo{ animation:logoin 1.1s cubic-bezier(.2,.8,.2,1) both;} @keyframes logoin{0%{opacity:0;transform:translateY(20px) scale(.9);letter-spacing:.3em}100%{opacity:1;transform:none;letter-spacing:.01em}}
  }
  .splash{ position:absolute;inset:0;z-index:80;background:radial-gradient(600px 400px at 50% 40%,rgba(122,77,255,.35),#050308 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}

  /* venue cover + cards */
  .cards{ display:flex;flex-direction:column;gap:16px;margin-top:16px;}
  .card{ position:relative;border-radius:22px;overflow:hidden;border:1px solid var(--line);cursor:pointer;transition:transform .18s;}
  .card:active{ transform:scale(.985);}
  .cover{ height:150px;position:relative;overflow:hidden;}
  .cover svg{ position:absolute;inset:0;width:100%;height:100%;}
  .meta{ padding:14px 16px 16px;background:var(--surface);}
  .row{ display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .genre{ position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 10px;border-radius:999px;background:rgba(11,7,16,.5);backdrop-filter:blur(6px);z-index:2;}
  .when{ position:absolute;top:12px;right:12px;font-size:12px;font-weight:600;padding:6px 10px;border-radius:999px;background:rgba(11,7,16,.5);backdrop-filter:blur(6px);z-index:2;}
  .covtag{ position:absolute;bottom:12px;left:14px;z-index:2;}
  .covtag .nm{ font-family:var(--display);font-size:26px;text-transform:uppercase;text-shadow:0 2px 18px rgba(0,0,0,.5);}
  .covtag .ar{ font-size:12px;font-weight:600;opacity:.9;display:flex;align-items:center;gap:5px;}
  .pricefrom{ font-size:13px;color:var(--muted);} .pricefrom b{ color:var(--txt);font-weight:700;}
  .pill{ font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;}

  /* chips / filters */
  .chips{ display:flex;gap:8px;overflow-x:auto;padding:14px 0 4px;-ms-overflow-style:none;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{ flex:none;font-size:13px;font-weight:600;padding:9px 15px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;transition:.18s;white-space:nowrap;}
  .chip.on{ color:#0B0710;background:linear-gradient(120deg,var(--magenta),var(--violet));border-color:transparent;}
  .locbtn{ display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--blue);background:rgba(43,212,255,.08);border:1px solid rgba(43,212,255,.3);border-radius:12px;padding:11px 14px;cursor:pointer;margin-top:12px;width:100%;justify-content:center;}
  .locbtn.on{ color:var(--ok);background:rgba(63,224,160,.08);border-color:rgba(63,224,160,.3);}

  /* buttons / forms */
  .btn{ display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:var(--body);font-weight:700;font-size:16px;color:#0B0710;border:0;border-radius:16px;padding:17px;cursor:pointer;
    background:linear-gradient(120deg,var(--magenta),var(--violet));box-shadow:0 10px 30px -8px rgba(255,61,174,.55);transition:transform .15s,opacity .15s;}
  .btn:active{ transform:scale(.98);}
  .btn[disabled]{ opacity:.35;box-shadow:none;cursor:not-allowed;}
  .btn.ghost{ background:transparent;color:var(--txt);border:1px solid var(--line);box-shadow:none;}
  .btn.gold{ background:linear-gradient(120deg,var(--gold),#ff9d4b);box-shadow:0 10px 30px -8px rgba(255,194,75,.5);}
  .btn.sm{ padding:12px;font-size:14px;}
  .field{ margin-top:14px;} .field label{ display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:600;}
  .input,textarea.input{ width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;color:var(--txt);font-family:var(--body);font-size:15px;resize:none;}
  .input::placeholder{ color:#5e5570;}
  .seg{ display:flex;gap:8px;margin-top:14px;}
  .seg .opt{ flex:1;border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:.18s;}
  .seg .opt.on{ border-color:var(--magenta);background:rgba(255,61,174,.08);}
  .seg .opt .t{ font-weight:700;font-size:15px;} .seg .opt .d{ font-size:11px;color:var(--muted);margin-top:3px;}

  /* topbar / back */
  .topbar{ display:flex;align-items:center;gap:14px;padding:6px 18px 4px;}
  .back{ width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}

  /* floor map */
  .legend{ display:flex;gap:13px;flex-wrap:wrap;margin:14px 0 6px;}
  .legend span{ display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .swatch{ width:11px;height:11px;border-radius:3px;}
  .mapwrap{ border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,#100B17,#0B0710);padding:8px;}
  svg .tbl{ cursor:pointer;transition:.18s;} svg .tbl.booked{ cursor:not-allowed;}
  .bookbar{ position:absolute;left:0;right:0;bottom:0;padding:16px 20px 18px;background:linear-gradient(180deg,rgba(11,7,16,0),rgba(11,7,16,.96) 28%);z-index:30;}

  .summary{ background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:18px;}
  .summary .li{ display:flex;justify-content:space-between;padding:8px 0;font-size:14px;color:var(--muted);border-bottom:1px solid rgba(43,35,54,.6);}
  .summary .li:last-child{border:0;} .summary .li b{color:var(--txt);}
  .summary .total{ display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;}
  .summary .total .amt{ font-family:var(--display);font-size:30px;}
  .micro{ font-size:11px;color:#6f6582;line-height:1.5;margin-top:10px;}
  .stepper{ display:flex;align-items:center;gap:14px;} .stepper button{ width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--surface-2);color:var(--txt);font-size:22px;cursor:pointer;}
  .stepper .val{ font-family:var(--display);font-size:26px;min-width:30px;text-align:center;}
  .splitrow{ display:flex;gap:12px;} .splitrow .col{ flex:1;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;}

  /* status / pass */
  .center{ flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:6px;}
  .spinner{ width:62px;height:62px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--magenta);animation:spin 1s linear infinite;margin-bottom:10px;} @keyframes spin{to{transform:rotate(360deg);}}
  .checkwrap{ width:84px;height:84px;border-radius:50%;background:linear-gradient(120deg,var(--magenta),var(--violet));display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px -8px rgba(255,61,174,.6);}
  .pass{ margin:8px 20px 0;border-radius:24px;overflow:hidden;border:1px solid var(--line);background:var(--surface);}
  .pass .head{ padding:20px;background:linear-gradient(120deg,rgba(255,61,174,.25),rgba(122,77,255,.22));}
  .pass .qr{ display:flex;justify-content:center;padding:22px;}
  .pass .det{ padding:0 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .pass .det .k{ font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .pass .det .v{ font-weight:700;font-size:15px;margin-top:3px;}

  /* tabbar */
  .tabbar{ flex:none;height:78px;display:flex;align-items:flex-start;justify-content:space-around;padding-top:11px;background:rgba(11,7,16,.92);border-top:1px solid var(--line);backdrop-filter:blur(10px);}
  .tab{ display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--muted);cursor:pointer;font-weight:600;position:relative;transition:.18s;}
  .tab.on{ color:var(--magenta);} .tab svg{ width:24px;height:24px;}
  .tab .dot{ position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--magenta);opacity:0;transition:.2s;}
  .tab.on .dot{ opacity:1;}
  .badge-n{ position:absolute;top:-3px;right:-8px;background:var(--magenta);color:#0B0710;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

  /* avatars */
  .av{ border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);color:#0B0710;flex:none;}
  .online{ width:11px;height:11px;border-radius:50%;background:var(--ok);border:2px solid var(--ink);position:absolute;bottom:0;right:0;}

  /* lists rows */
  .lrow{ display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid rgba(43,35,54,.55);cursor:pointer;}
  .lrow .nm{ font-weight:700;font-size:15px;} .lrow .meta2{ font-size:13px;color:var(--muted);margin-top:2px;}
  .pos{ position:relative;}

  /* chat */
  .chatbody{ flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:9px;}
  .chatbody::-webkit-scrollbar{width:0;}
  .bub{ max-width:74%;padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.4;}
  .bub.me{ align-self:flex-end;background:linear-gradient(120deg,var(--magenta),var(--violet));color:#fff;border-bottom-right-radius:5px;}
  .bub.them{ align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:5px;}
  .composer{ flex:none;display:flex;gap:9px;padding:12px 14px 16px;border-top:1px solid var(--line);background:rgba(11,7,16,.9);}
  .composer input{ flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:12px 16px;color:var(--txt);font-family:var(--body);font-size:14px;}
  .send{ width:46px;height:46px;border-radius:50%;border:0;background:linear-gradient(120deg,var(--magenta),var(--violet));color:#fff;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;}

  /* profile */
  .phero{ padding:24px 20px 18px;text-align:center;background:linear-gradient(180deg,rgba(122,77,255,.18),transparent);}
  .pstats{ display:flex;gap:10px;margin-top:18px;}
  .pstats .b{ flex:1;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 8px;text-align:center;}
  .pstats .n{ font-family:var(--display);font-size:24px;} .pstats .l{ font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
  .tog{ width:48px;height:28px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);position:relative;cursor:pointer;transition:.2s;flex:none;}
  .tog.on{ background:linear-gradient(120deg,var(--ok),var(--teal));border-color:transparent;}
  .tog i{ position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;}
  .tog.on i{ left:22px;}
  .setrow{ display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid rgba(43,35,54,.55);}

  /* venue host studio */
  .studio-prev{ border:1px solid var(--line);border-radius:18px;overflow:hidden;}
  .stylepick{ display:flex;gap:8px;margin-top:10px;overflow-x:auto;scrollbar-width:none;} .stylepick::-webkit-scrollbar{display:none;}
  .styleopt{ flex:none;width:74px;height:54px;border-radius:12px;overflow:hidden;border:2px solid transparent;cursor:pointer;position:relative;}
  .styleopt.on{ border-color:var(--magenta);}
  .styleopt svg{ width:100%;height:100%;display:block;}
  .req{ border:1px solid var(--line);border-radius:18px;background:var(--surface);padding:16px;margin-top:14px;}
  .req .actions{ display:flex;gap:10px;margin-top:14px;}
  .badge{ font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;letter-spacing:.04em;}
  .empty{ text-align:center;color:var(--muted);padding:48px 24px;font-size:14px;line-height:1.6;}
  .stat{ display:flex;gap:10px;margin-top:16px;}
  .stat .box{ flex:1;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;}
  .stat .box .n{ font-family:var(--display);font-size:24px;} .stat .box .l{ font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-top:2px;}

  .clubselect{ display:flex;gap:8px;overflow-x:auto;padding:12px 0 6px;scrollbar-width:none;}
  .clubselect::-webkit-scrollbar{display:none;}
  .clubopt{ flex:none;display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:9px 12px;cursor:pointer;min-width:154px;}
  .clubopt.on{ border-color:var(--magenta);background:rgba(255,61,174,.08);}
  .clubdot{ width:26px;height:26px;border-radius:9px;flex:none;}
  .clubopt .cname{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;}
  .clubopt .cmeta{font-size:11px;color:var(--muted);margin-top:1px;}
  .back svg{width:22px;height:22px;display:block;}

  /* growth features added: availability, split-pay, promoters, queue bypass */
  .availability{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px;}
  .availability .a{background:rgba(255,255,255,.035);border:1px solid rgba(43,35,54,.8);border-radius:12px;padding:8px 6px;text-align:center;}
  .availability .a .n{font-family:var(--display);font-size:18px;line-height:1;color:var(--txt);}
  .availability .a .l{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .availability .a.low .n{color:var(--gold);} .availability .a.out .n{color:var(--warn);}
  .invitechip{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:8px 11px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .invitechip.on{border-color:var(--teal);background:rgba(63,224,192,.1);color:var(--txt);}
  .promobox{background:linear-gradient(120deg,rgba(255,194,75,.13),rgba(255,61,174,.08));border:1px solid rgba(255,194,75,.28);border-radius:18px;padding:14px;margin-top:14px;}
  .payreq{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-top:9px;}
  .payreq .left{display:flex;align-items:center;gap:10px;min-width:0;}
  .payreq .who{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .payreq .due{font-size:12px;color:var(--muted);margin-top:2px;}
  .payreq.paid{border-color:rgba(63,224,160,.35);background:rgba(63,224,160,.07);}
  .fee-banner{margin:12px 0 4px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,194,75,.35);background:rgba(255,194,75,.09);color:var(--gold);font-size:12px;font-weight:800;text-align:center;}
  .addfriend{display:flex;gap:8px;margin-top:10px;}
  .addfriend .input{flex:1;}
  .bypass{display:flex;gap:10px;align-items:center;background:rgba(63,224,160,.09);border:1px solid rgba(63,224,160,.26);border-radius:16px;padding:12px;margin:14px 20px 0;}
  .bypass .ico{width:34px;height:34px;border-radius:10px;background:linear-gradient(120deg,var(--ok),var(--teal));display:flex;align-items:center;justify-content:center;color:#0B0710;font-weight:900;flex:none;}
  .minirow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;font-size:13px;color:var(--muted);padding:8px 0;border-bottom:1px solid rgba(43,35,54,.45);}
  .minirow:last-child{border-bottom:0}.minirow b{color:var(--txt)}

  .timerbox{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid rgba(255,194,75,.35);background:rgba(255,194,75,.08);border-radius:16px;padding:12px 14px;margin-top:14px;}
  .timerbox.danger{border-color:rgba(255,107,107,.45);background:rgba(255,107,107,.09);}
  .timerbox .time{font-family:var(--display);font-size:24px;color:var(--gold);letter-spacing:.03em;}
  .timerbox.danger .time{color:var(--warn);}
  .searchresults{margin-top:10px;border:1px solid var(--line);border-radius:16px;background:rgba(28,22,38,.55);overflow:hidden;}
  .searchresults .hintrow{padding:12px 14px;color:var(--muted);font-size:12px;line-height:1.4;}
  .searchhit{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid rgba(43,35,54,.55);}

             p3:[{f:'them',t:'send me the Seat\'d link'}] },

  const tierMeta={ vip:{label:'VIP',color:'#FFC24B'}, booth:{label:'Booth',color:'#FF3DAE'}, std:{label:'Standard',color:'#2BD4FF'} };

  const clubVenue=()=>venue(S.clubVenueId)||venue('v1');
  function clubSelectorHTML(){

  const bookingMath=(t)=>{
    const entryTotal=0;

    const fee=serviceFee(groupTotal);
    const chargeTotal=groupTotal+fee;
    const splitCount=S.splitPay ? Math.max(1,S.invited.length+1) : 1;

  function splitPaymentsFor(t,v){
    const m=bookingMath(t);
    const invited=S.splitPay?S.invited.slice():[];
    const base=Math.floor(m.chargeTotal/m.splitCount);
    const remainder=m.chargeTotal-(base*m.splitCount);

    const rows=[{id:'host',name:people.me.name,amount:hostAmount,status:'paid'}];
    invited.forEach(id=>{const p=people[id]; if(p) rows.push({id,name:p.name,amount:base,status:'pending'});});

  }
  function paidCount(r){ const ps=r.payments||[]; return ps.filter(p=>p.status==='paid').length+'/'+(ps.length||1); }

  function sendPaymentPings(r){ (r.invited||[]).forEach(id=>{ const p=people[id]; if(!p)return; S.convos[id]=S.convos[id]||[]; S.convos[id].push({f:'me',t:`Seat'd payment request: ${r.venue} ${r.table}. Please pay your share (${fmt((r.payments||[]).find(x=>x.id===id)?.amount||0)}) to confirm the table.`}); }); }
  function allPaid(r){ const ps=r.payments||[]; return ps.length>0 && ps.every(p=>p.status==='paid'); }
  function timeLeftMs(r){ if(!r.deadlineMs) return 0; return Math.max(0, r.deadlineMs-Date.now()); }
  function timeLeftText(r){ const ms=timeLeftMs(r); const m=Math.floor(ms/60000), sec=Math.floor((ms%60000)/1000); return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }
  function refreshExpiries(){ let changed=false; S.requests.forEach(r=>{ if(r.status==='pending' && r.deadlineMs && !allPaid(r) && Date.now()>=r.deadlineMs){ r.status='cancelled'; r.cancelReason='Payment window expired'; changed=true; }}); return changed; }
  function deadlineHTML(r,who){ if(r.status!=='pending'||!r.deadlineMs||allPaid(r)) return ''; const danger=timeLeftMs(r)<=5*60000; return `<div class="timerbox ${danger?'danger':''}" data-timerbox="${r.id}"><div><div class="nm" style="font-size:14px">${who==='club'?'Payment window':'Complete payment window'}</div><div class="meta2">Auto-cancels unless every invited person pays in 20 minutes.</div></div><div class="time" data-timer="${r.id}">${timeLeftText(r)}</div></div>`; }
  function tableCostRecovered(r){
    return S.publicTables.filter(pt=>pt.bookingId===r.id).reduce((sum,pt)=>sum+(pt.joiners||[]).filter(j=>j.status==='approved').reduce((a,j)=>a+(j.amount||publicJoinPrice(pt,j.gender)||0),0),0);

  function publicTableForBooking(id){ return S.publicTables.find(pt=>pt.bookingId===id); }

  function searchPeople(raw){ const q=(raw||'').trim().toLowerCase().replace(/^@/,''); const pool=Object.values(people).filter(p=>p.id!=='me'&&!S.friends.includes(p.id)); if(!q) return pool.slice(0,3).map(p=>({p,score:0,label:'Suggested'}));
    const score=p=>{const n=p.name.toLowerCase(), h=p.handle.toLowerCase().replace(/^@/,''); if(n===q||h===q)return 100; if(n.startsWith(q)||h.startsWith(q))return 80; if(n.includes(q)||h.includes(q))return 60; let hits=0; q.split('').forEach(c=>{if((n+h).includes(c))hits++;}); return hits;};
    return pool.map(p=>({p,score:score(p),label:score(p)>=60?'Match':'Closest result'})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,3); }
  function friendSearchHTML(raw,context){ const hits=searchPeople(raw); const q=(raw||'').trim(); if(!hits.length) return `<div class="searchresults"><div class="hintrow">No close match found. Press Add to create ${esc(q||'a new friend')}.</div></div>`;

  // ---------- COVER ART (realistic generated club photos) ----------
  function cover(v,h){ h=h||150;
    const id=(v.id||('v'+v.name)).replace(/[^a-zA-Z0-9]/g,'');
    const a=v.g[0], b=v.g[1];
    const seed=[...v.name].reduce((n,ch)=>n+ch.charCodeAt(0),0);
    const rand=i=>{ const x=Math.sin(seed+i*999)*10000; return x-Math.floor(x); };
    const theme=(v.style||'neon');
    const isTiny=h<=60;
    const peopleCount=isTiny?0:18;
    let crowd='';
    for(let i=0;i<peopleCount;i++){
      const x=8+rand(i)*324, headY=h-42-rand(i+30)*18, bodyH=18+rand(i+60)*16;
      const opacity=.35+rand(i+80)*.35;
      crowd+=`<g opacity="${opacity.toFixed(2)}"><circle cx="${x.toFixed(1)}" cy="${headY.toFixed(1)}" r="${(3+rand(i+10)*2).toFixed(1)}" fill="#050308"/><path d="M${(x-5).toFixed(1)} ${headY+6} Q${x.toFixed(1)} ${headY+bodyH} ${(x+6).toFixed(1)} ${headY+6}" fill="#050308"/></g>`;
    }
    let bottles='';
    if(!isTiny){
      for(let i=0;i<7;i++){
        const x=36+i*42+rand(i+100)*8, y=h-34-rand(i+120)*8;
        bottles+=`<g opacity=".72"><rect x="${x}" y="${y}" width="7" height="22" rx="2" fill="#09050d"/><rect x="${x+1}" y="${y-5}" width="5" height="8" rx="1.5" fill="#09050d"/><rect x="${x+1}" y="${y+8}" width="5" height="5" rx="1" fill="${i%2?a:b}" opacity=".75"/></g>`;
      }
    }
    const lasers=Array.from({length: theme==='mono'?3:7},(_,i)=>{
      const x=20+rand(i+150)*300, dx=-80+rand(i+170)*160;
      const col=i%2?a:b;
      return `<path class="beam" d="M${x.toFixed(1)} -8 L${(x+dx).toFixed(1)} ${h+8}" stroke="${col}" stroke-width="${theme==='laser'?3:2}" opacity=".38" filter="url(#photoGlow-${id})"/>`;
    }).join('');
    const lights=Array.from({length:isTiny?5:16},(_,i)=>{
      const x=10+rand(i+200)*320, y=6+rand(i+220)*(h*.45), r=2+rand(i+240)*7;
      const col=i%3===0?'#fff':(i%3===1?a:b);
      return `<circle class="glow" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="${col}" opacity="${(.18+rand(i+260)*.34).toFixed(2)}" filter="url(#photoGlow-${id})"/>`;
    }).join('');
    const vipBooths=!isTiny?`<g opacity=".92">
      <path d="M18 ${h-42} Q74 ${h-63} 130 ${h-42} L130 ${h-13} Q76 ${h-31} 18 ${h-13} Z" fill="#08050c"/>
      <path d="M210 ${h-44} Q270 ${h-66} 328 ${h-43} L328 ${h-14} Q270 ${h-31} 210 ${h-14} Z" fill="#08050c"/>
      <path d="M22 ${h-40} Q74 ${h-56} 126 ${h-40}" stroke="${a}" stroke-width="2" opacity=".55"/>
      <path d="M214 ${h-42} Q270 ${h-58} 324 ${h-42}" stroke="${b}" stroke-width="2" opacity=".55"/>
    </g>`:'';
    const dj=!isTiny?`<g opacity=".95">
      <rect x="118" y="${Math.max(22,h*.28)}" width="104" height="32" rx="8" fill="#06030a"/>
      <circle cx="148" cy="${Math.max(38,h*.28+16)}" r="8" fill="#141019" stroke="${a}" opacity=".9"/>
      <circle cx="192" cy="${Math.max(38,h*.28+16)}" r="8" fill="#141019" stroke="${b}" opacity=".9"/>
      <rect x="160" y="${Math.max(33,h*.28+11)}" width="20" height="4" rx="2" fill="#F5F0FA" opacity=".65"/>
    </g>`:'';
    const balcony=theme==='sunset'?`<path d="M0 ${h*.58} C70 ${h*.5} 120 ${h*.66} 180 ${h*.56} S285 ${h*.48} 340 ${h*.59} L340 ${h} L0 ${h} Z" fill="#030206" opacity=".7"/>`:'';
    const ceiling=theme==='mono'?`<g opacity=".55">${Array.from({length:6},(_,i)=>`<path d="M${i*68} 0 L${170+i*14} ${h*.55}" stroke="#F5F0FA" stroke-width="1" opacity=".12"/>`).join('')}</g>`:'';
    return `<svg viewBox="0 0 340 ${h}" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <linearGradient id="photoBg-${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#050308"/><stop offset=".38" stop-color="${a}" stop-opacity=".72"/><stop offset="1" stop-color="${b}" stop-opacity=".78"/></linearGradient>
        <radialGradient id="spotA-${id}" cx="30%" cy="10%" r="65%"><stop offset="0" stop-color="#fff" stop-opacity=".42"/><stop offset=".24" stop-color="${a}" stop-opacity=".42"/><stop offset="1" stop-color="#050308" stop-opacity="0"/></radialGradient>
        <radialGradient id="spotB-${id}" cx="76%" cy="18%" r="62%"><stop offset="0" stop-color="#fff" stop-opacity=".32"/><stop offset=".28" stop-color="${b}" stop-opacity=".40"/><stop offset="1" stop-color="#050308" stop-opacity="0"/></radialGradient>
        <linearGradient id="floor-${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#141019" stop-opacity=".1"/><stop offset="1" stop-color="#000" stop-opacity=".96"/></linearGradient>
        <filter id="photoGlow-${id}"><feGaussianBlur stdDeviation="3"/></filter>
      </defs>
      <rect width="340" height="${h}" fill="url(#photoBg-${id})"/>
      <rect width="340" height="${h}" fill="url(#spotA-${id})"/>
      <rect width="340" height="${h}" fill="url(#spotB-${id})"/>
      ${ceiling}${lasers}${lights}${dj}${balcony}${vipBooths}${bottles}${crowd}
      <rect y="${h*.62}" width="340" height="${h*.38}" fill="url(#floor-${id})"/>
      <path d="M0 ${h-22} C55 ${h-38} 96 ${h-20} 145 ${h-31} S244 ${h-48} 340 ${h-27} L340 ${h} L0 ${h} Z" fill="#000" opacity=".78"/>
      <rect width="340" height="${h}" fill="#000" opacity=".18"/>
    </svg>`;
  }
  function styleSwatch(style,g){ const v={id:'sw'+Math.random().toString(36).slice(2,6),g,style}; return cover(v,54); }

  function clubInsights(){
    const v=clubVenue();
    const reqs=S.requests.filter(r=>r.vid===v.id);
    const confirmed=reqs.filter(r=>r.status==='confirmed');
    const pending=reqs.filter(r=>r.status==='pending');
    const declined=reqs.filter(r=>r.status==='rejected');
    const prepaid=confirmed.reduce((a,r)=>a+(Number(r.total)||0),0);
    const barCredit=confirmed.reduce((a,r)=>a+(Number(r.min)||0),0);
    const entryRevenue=confirmed.reduce((a,r)=>a+Math.max(0,(Number(r.total)||0)-(Number(r.min)||0)),0);
    const guests=confirmed.reduce((a,r)=>a+(Number(r.men)||0)+(Number(r.women)||0),0);
    const guys=confirmed.reduce((a,r)=>a+(Number(r.men)||0),0);
    const girls=confirmed.reduce((a,r)=>a+(Number(r.women)||0),0);
    const avgParty=confirmed.length?(guests/confirmed.length).toFixed(1):'0.0';
    const guyPct=guests?Math.round(guys/guests*100):0;
    const girlPct=guests?100-guyPct:0;
    const tables=tablesFor(v.id);
    const prepaidPct=tables.length?Math.round(confirmed.length/tables.length*100):0;
    const scans=guests;
    const commission=Math.round(prepaid*0.05);
    const byPromo={};
    confirmed.forEach(r=>{const k=(r.promo||'DIRECT').toUpperCase(); if(!byPromo[k])byPromo[k]={bookings:0,total:0}; byPromo[k].bookings++; byPromo[k].total+=Number(r.total)||0;});
    const promos=Object.entries(byPromo).sort((a,b)=>b[1].total-a[1].total).slice(0,3);
    const bars=[12,18,25,33,45,confirmed.length*18+pending.length*8+20,Math.max(10,confirmed.length*14+30)];
    const days=['M','T','W','T','F','S','S'];
    return `${statusbar()}<div class="body enter"><div class="pad">
      <div class="h1" style="font-size:28px">Insights</div><div class="sub">${esc(v.name)} - live from approved transactions</div>${clubSelectorHTML()}
      <div class="stat"><div class="box"><div class="n">${prepaidPct}%</div><div class="l">Tables prepaid</div></div>
        <div class="box"><div class="n">${pending.length}</div><div class="l">Waiting</div></div>
        <div class="box"><div class="n">${fmt(prepaid)}</div><div class="l">Tonight</div></div></div>
      <div class="eyebrow" style="margin-top:24px">Bookings by night</div>
      <div style="display:flex;align-items:flex-end;gap:10px;height:140px;margin-top:14px">
        ${bars.map((b,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%">
          <div style="width:100%;height:${Math.min(100,b)}%;border-radius:8px 8px 0 0;background:linear-gradient(180deg,var(--magenta),var(--violet))" class="enter"></div>
          <span class="meta2" style="font-size:11px">${days[i]}</span></div>`).join('')}</div>
      <div class="eyebrow" style="margin-top:24px">Crowd split</div>
      <div class="summary"><div class="li"><span>Guys</span><b>${guyPct}% (${guys})</b></div><div class="li"><span>Girls</span><b>${girlPct}% (${girls})</b></div>
        <div class="li"><span>Avg party size</span><b>${avgParty}</b></div><div class="li"><span>Declined requests</span><b>${declined.length}</b></div></div>
      <div class="eyebrow" style="margin-top:24px">Spend tracking</div>
      <div class="summary"><div class="minirow"><span>Prepaid bar credit tonight</span><b>${fmt(barCredit)}</b></div><div class="minirow"><span>Entry revenue tonight</span><b>${fmt(entryRevenue)}</b></div><div class="minirow"><span>Queue bypass scans</span><b>${scans}</b></div><div class="minirow"><span>Promoter commission owed</span><b>${fmt(commission)}</b></div></div>
      <div class="eyebrow" style="margin-top:24px">Top promoters</div>
      <div class="summary">${promos.length?promos.map(([k,d])=>`<div class="minirow"><span>${esc(k)}</span><b>${d.bookings} booking${d.bookings===1?'':'s'} - ${fmt(Math.round(d.total*0.05))}</b></div>`).join(''):`<div class="minirow"><span>No approved promoter bookings yet</span><b>R0</b></div>`}</div>
      <div class="micro">Approve or decline requests in the Requests tab and these figures update instantly.</div>
    </div></div>${clubTabbar()}`;
  }

  // ---------- BIND ----------
  function setRole(r){ S.role=r; S.screen='home';
    S.tab = r==='club'?'requests' : r==='admin'?'clubs' : 'discover'; render(); }
  function bind(){
    // Robust delegated click handler for the club/admin controls.
    // This keeps menus clickable even when nested SVGs/text inside the button are tapped.
    if(root._seatdClubClickHandler){
      root.removeEventListener('click', root._seatdClubClickHandler, true);
    }
    root._seatdClubClickHandler=function(e){
      const hit=(sel)=>e.target.closest(sel);
      let el;
      if((el=hit('[data-clubselect]'))){ e.preventDefault(); e.stopPropagation(); S.clubVenueId=el.dataset.clubselect; render(); return; }
      if((el=hit('[data-clubreq]'))){ e.preventDefault(); e.stopPropagation(); S.clubRequestVenueId=el.dataset.clubreq; render(); return; }
      if((el=hit('[data-sarea]'))){ e.preventDefault(); e.stopPropagation(); clubVenue().area=el.dataset.sarea; render(); return; }
      if((el=hit('[data-sstyle]'))){ e.preventDefault(); e.stopPropagation(); clubVenue().style=el.dataset.sstyle; render(); return; }
      if((el=hit('[data-clubtab]'))){ e.preventDefault(); e.stopPropagation(); S.tab=el.dataset.clubtab; S.screen='home'; render(); return; }
      if((el=hit('[data-tab]')) && (S.role==='club'||S.role==='admin')){ e.preventDefault(); e.stopPropagation(); S.tab=el.dataset.tab; S.screen='home'; render(); return; }
      if((el=hit('[data-acc]'))){ e.preventDefault(); e.stopPropagation(); decide(el.dataset.acc,'confirmed'); return; }
      if((el=hit('[data-rej]'))){ e.preventDefault(); e.stopPropagation(); decide(el.dataset.rej,'rejected'); return; }
      if((el=hit('[data-capprove]'))){ e.preventDefault(); e.stopPropagation(); approveClub(el.dataset.capprove); return; }
      if((el=hit('[data-creject]'))){ e.preventDefault(); e.stopPropagation(); S.pendingClubs=S.pendingClubs.filter(v=>v.id!==el.dataset.creject); render(); return; }
      if((el=hit('[data-act="save-venue"]'))){ e.preventDefault(); e.stopPropagation(); act('save-venue',el); return; }
    };
    root.addEventListener('click', root._seatdClubClickHandler, true);
    const q=(s,f)=>root.querySelectorAll(s).forEach(f);
    q('[data-setrole]',b=>b.onclick=()=>setRole(b.dataset.setrole));
    q('[data-act]',b=>b.onclick=()=>act(b.dataset.act,b));
    q('[data-srole]',b=>b.onclick=()=>{S.signupRole=b.dataset.srole;captureSignup();render();});
    q('[data-venue]',b=>b.onclick=()=>{S.venueId=b.dataset.venue;S.selTable=null;S.screen='venue';render();});
    q('.tbl[data-table]',g=>{if(g.dataset.table)g.onclick=()=>{S.selTable=g.dataset.table;render();};});
    q('[data-go]',b=>b.onclick=()=>go(b.dataset.go));
    q('[data-clubtab]',t=>t.onclick=()=>{S.tab=t.dataset.clubtab;S.screen='home';render();});
    q('[data-tab]',t=>t.onclick=()=>{S.tab=(t.dataset.tab==='studio'?'requests':t.dataset.tab);S.screen='home';render();});
    q('[data-step]',b=>b.onclick=()=>{const[k,d]=b.dataset.step.split(':');const nv=S[k]+parseInt(d);const t=S.venueId&&S.selTable?tablesFor(S.venueId).find(x=>x.id===S.selTable):null;const total=(k==='men'?nv+S.women:nv+S.men);if(nv>=0&&total>=1&&(!t||total<=t.seats)){S[k]=nv;}render();});
    q('[data-acc]',b=>b.onclick=()=>decide(b.dataset.acc,'confirmed'));
    q('[data-rej]',b=>b.onclick=()=>decide(b.dataset.rej,'rejected'));
    q('[data-chat]',b=>b.onclick=()=>{S.activeChat=b.dataset.chat;S.tab='messages';S.screen='chat';render();});
    q('[data-add]',b=>b.onclick=()=>{if(!S.friends.includes(b.dataset.add))S.friends.push(b.dataset.add);render();});
    q('[data-addsearch]',b=>b.onclick=()=>{const id=b.dataset.addsearch;if(!S.friends.includes(id))S.friends.push(id);if(b.dataset.context==='booking'&&!S.invited.includes(id))S.invited.push(id);S.friendDraft='';render();});
    q('[data-payfriend]',b=>b.onclick=()=>{const card=b.closest('[data-bookingid]'); const r=S.requests.find(x=>x.id===S.activeReq)||S.requests.find(x=>card&&x.id===card.dataset.bookingid); if(r&&r.payments){const p=r.payments.find(x=>x.id===b.dataset.payfriend); if(p)p.status='paid';} render();});
    q('[data-viewbooking]',b=>b.onclick=()=>{S.activeReq=b.dataset.viewbooking;S.screen='status';render();});
    q('[data-makepublic]',b=>b.onclick=()=>makePublic(b.dataset.makepublic));
    q('[data-savepubprice]',b=>b.onclick=()=>savePublicPrice(b.dataset.savepubprice));
    q('[data-joinpublic]',b=>b.onclick=()=>requestJoinPublic(b.dataset.joinpublic));
    q('[data-approvejoin]',b=>b.onclick=()=>decideJoin(b.dataset.approvejoin,true));
    q('[data-denyjoin]',b=>b.onclick=()=>decideJoin(b.dataset.denyjoin,false));
    q('[data-invite]',b=>b.onclick=()=>{const id=b.dataset.invite; S.invited=S.invited.includes(id)?S.invited.filter(x=>x!==id):S.invited.concat(id); render();});

    q('[data-copybooking]',b=>b.onclick=()=>{S.shareSent=b.dataset.copybooking; render();});
    q('[data-sendbooking]',b=>b.onclick=()=>sendBookingInvite(b.dataset.sendbooking));
    q('[data-sendbookingnew]',b=>b.onclick=()=>sendBookingInvite(b.dataset.sendbookingnew+':new'));
    root.querySelectorAll('[id^="share-in-"]').forEach(inp=>{inp.oninput=e=>{S.shareDraft=e.target.value; const card=inp.closest('[data-sharebooking]'); const box=card&&card.querySelector('.searchresults'); if(box) box.outerHTML=shareMatchesHTML(S.shareDraft, card.dataset.sharebooking); bind();}; inp.onkeydown=e=>{if(e.key==='Enter'){const card=inp.closest('[data-sharebooking]'); if(card)sendBookingInvite(card.dataset.sharebooking+':new');}};});

    q('[data-area]',b=>b.onclick=()=>{S.area=b.dataset.area;render();});
    q('[data-sarea]',b=>b.onclick=()=>{clubVenue().area=b.dataset.sarea;render();});
    q('[data-sstyle]',b=>b.onclick=()=>{clubVenue().style=b.dataset.sstyle;render();});
    q('[data-clubselect]',b=>b.onclick=()=>{S.clubVenueId=b.dataset.clubselect;render();});
    q('[data-clubreq]',b=>b.onclick=()=>{S.clubRequestVenueId=b.dataset.clubreq;render();});
    q('[data-capprove]',b=>b.onclick=()=>approveClub(b.dataset.capprove));
    q('[data-creject]',b=>b.onclick=()=>{S.pendingClubs=S.pendingClubs.filter(v=>v.id!==b.dataset.creject);render();});
    const fi=root.querySelector('#friend-in'); if(fi){fi.oninput=e=>{S.friendDraft=e.target.value; const box=root.querySelector('.searchresults'); if(box) box.outerHTML=friendSearchHTML(S.friendDraft, S.screen==='booking'?'booking':'friends'); bind();}; fi.onkeydown=e=>{if(e.key==='Enter')addFriendFromInput();};}
    const mi=root.querySelector('#msg-in'); if(mi) mi.onkeydown=e=>{if(e.key==='Enter')send();};
  }
  function captureSignup(){ const n=root.querySelector('#f-name'),h=root.querySelector('#f-handle'),e=root.querySelector('#f-email');
    if(n)S.auth.name=n.value; if(h)S.auth.handle=h.value; if(e)S.auth.email=e.value; }
  function act(a,el){
    if(a==='confirm-joinpay'){confirmJoinPayment();return;}
    if(a==='go-signup'){S.screen='signup';render();return;}
    if(a==='login'){setRole('user');return;}
    if(a==='auth-back'){S.screen='home';render();return;}
    if(a==='finish-signup'){captureSignup();
      if(S.auth.name)people.me.name=S.auth.name;
      if(S.signupRole==='user'&&S.auth.handle)people.me.handle=S.auth.handle.startsWith('@')?S.auth.handle:'@'+S.auth.handle;
      if(S.signupRole==='club'){ const id='v'+(Date.now()%10000);
        S.pendingClubs.push({id,name:S.auth.handle||'New Venue',area:'Sandton',dist:1,genre:'House',when:'Soon',minFrom:1500,tagline:'Just joined Seat\'d.',style:'neon',g:['#FF3DAE','#7A4DFF'],status:'pending',owner:'me',applicant:S.auth.name});
      }
      setRole(S.signupRole); return; }
    if(a==='near'){S.nearMe=!S.nearMe;render();return;}
    if(a==='friends'){S.screen='friends';render();return;}
    if(a==='msg-back'){S.screen='home';render();return;}
    if(a==='chat-back'){S.screen='home';render();return;}
    if(a==='send'){send();return;}
    if(a==='edit'){S.screen='editprofile';render();return;}
    if(a==='my-bookings'){S.tab='bookings';S.screen='home';render();return;}
    if(a==='prof-back'){S.screen='home';render();return;}
    if(a==='save-profile'){const n=root.querySelector('#e-name'),h=root.querySelector('#e-handle'),b=root.querySelector('#e-bio');
      if(n)people.me.name=n.value; if(h)people.me.handle=h.value.startsWith('@')?h.value:'@'+h.value; if(b)people.me.bio=b.value; S.screen='home';render();return;}
    if(a==='toggle-out'){people.me.out=!people.me.out;render();return;}
    if(a==='toggle-split'){const pi=root.querySelector('#promo-in'); if(pi)S.promoterCode=pi.value.toUpperCase().trim()||S.promoterCode; S.splitPay=!S.splitPay;render();return;}
    if(a==='add-friend-booking'){addFriendFromInput();return;}
    if(a==='logout'){S.role=null;S.screen='home';S.splashDone=true;render();return;}
    if(a==='save-venue'){const v=clubVenue();const n=root.querySelector('#s-name'),t=root.querySelector('#s-tag'),g=root.querySelector('#s-genre');
      if(n)v.name=n.value; if(t)v.tagline=t.value; if(g)v.genre=g.value; render();return;}
  }

  function sendBookingInvite(key){
    const parts=String(key).split(':'), bid=parts[0], uid=parts[1];
    const r=S.requests.find(x=>x.id===bid); if(!r)return;
    let id=uid;
    if(uid==='new'){
      const raw=(S.shareDraft||'').trim(); if(!raw)return;
      const clean=raw.startsWith('@')?raw.slice(1):raw;
      id='p'+Date.now();
      people[id]={id,name:clean.replace(/^./,c=>c.toUpperCase()),handle:raw.startsWith('@')?raw:'@'+clean.toLowerCase().replace(/\s+/g,''),g:['#2BD4FF','#7A4DFF'],online:false};
      if(!S.friends.includes(id))S.friends.push(id);
    }
    const p=people[id]; if(!p)return;
    S.convos[id]=S.convos[id]||[];
    S.convos[id].push({f:'me',t:`Seat'd invite: join my table at ${r.venue} (${r.table}). Booking ref ${r.code||r.id}. Link: ${bookingLink(r)}`});
    if(!S.friends.includes(id))S.friends.push(id);
    S.shareSent=bid; S.shareDraft=''; render();
  }

  function addFriendFromInput(){
    const i=root.querySelector('#friend-in'); const raw=(i&&i.value?i.value.trim():''); if(!raw)return;
    const id='p'+Date.now(); const clean=raw.startsWith('@')?raw.slice(1):raw;
    people[id]={id,name:clean.replace(/^./,c=>c.toUpperCase()),handle:raw.startsWith('@')?raw:'@'+clean.toLowerCase().replace(/\s+/g,''),g:['#2BD4FF','#7A4DFF'],online:false};
    S.friends.push(id); if(S.screen==='booking')S.invited.push(id); render();
  }
  function makePublic(bookingId){
    const r=S.requests.find(x=>x.id===bookingId); if(!r)return;
    if(!publicTableForBooking(bookingId)){
      { const limit=tableSeatLimitBy(r.vid,r.table)||8; const open=Math.max(0,limit-((r.men||0)+(r.women||0))); S.publicTables.unshift({id:'pub'+Date.now(),bookingId:r.id,venue:r.venue,vid:r.vid,table:r.table,tier:r.tier,owner:people.me.name,ownerId:'me',malePrice:Math.ceil((r.total||r.min||0)/4),femalePrice:Math.ceil((r.total||r.min||0)/5),price:Math.ceil((r.total||r.min||0)/4),seatsOpen:open,status:'open',joinRequests:open>0?[{id:'jr'+Date.now(),userId:'p5',name:'Jay R.',gender:'male',amount:Math.ceil((r.total||r.min||0)/4),status:'pending'}]:[],joiners:[]}); }
    }
    render();
  }
  function savePublicPrice(id){
    const pt=S.publicTables.find(x=>x.id===id); if(!pt)return;
    const male=root.querySelector('#pub-male-price-'+id), female=root.querySelector('#pub-female-price-'+id);
    const mVal=parseInt((male&&male.value||'').replace(/\D/g,''),10);
    const fVal=parseInt((female&&female.value||'').replace(/\D/g,''),10);
    if(mVal>0){ pt.malePrice=mVal; pt.price=mVal; }
    if(fVal>0) pt.femalePrice=fVal;
    render();
  }
  function requestJoinPublic(key){
    const [id,genderRaw]=String(key).split(':');
    const gender=genderRaw==='female'?'female':'male';
    const pt=S.publicTables.find(x=>x.id===id); if(!pt)return;
    if(publicSpotsOpen(pt)<=0){ render(); return; }
    if((pt.joinRequests||[]).some(j=>j.userId==='me'&&j.status==='pending') || (pt.joiners||[]).some(j=>j.id==='me')){ render(); return; }
    S.activeJoin={ptId:id,gender};
    S.screen='joinpay';
    render();
  }
  function confirmJoinPayment(){
    if(!S.activeJoin)return;
    const {ptId,gender}=S.activeJoin;
    const pt=S.publicTables.find(x=>x.id===ptId); if(!pt)return;
    pt.joinRequests=pt.joinRequests||[];
    if(publicSpotsOpen(pt)<=0){ S.activeJoin=null; S.screen='home'; render(); return; }
    const amount=publicJoinPrice(pt,gender);
    if(!pt.joinRequests.some(j=>j.userId==='me'&&j.status==='pending') && !(pt.joiners||[]).some(j=>j.id==='me')){
      pt.joinRequests.push({id:'jr'+Date.now(),userId:'me',name:people.me.name,gender,amount,subtotal:amount,serviceFee:serviceFee(amount),total:withServiceFee(amount),status:'pending'});
    }
    S.activeJoin=null;
    S.screen='home'; S.tab='discover';
    render();
  }
  function decideJoin(key,ok){
    const [ptid,jrid]=key.split(':'); const pt=S.publicTables.find(x=>x.id===ptid); if(!pt)return;
    const j=(pt.joinRequests||[]).find(x=>x.id===jrid); if(!j)return;
    if(ok){ if(publicSpotsOpen(pt)<=0){ render(); return; } j.status='approved'; pt.joiners=pt.joiners||[]; if(!pt.joiners.some(x=>x.id===j.userId)) pt.joiners.push({id:j.userId,name:j.name,gender:j.gender,amount:j.amount||publicJoinCharge(pt,j.gender),status:'approved'}); pt.seatsOpen=publicSpotsOpen(pt); }
    else j.status='denied';
    render();
  }
  function go(to){
    if(to==='submit'){const t=tablesFor(S.venueId).find(x=>x.id===S.selTable),v=venue(S.venueId),id='r'+Date.now(); if((S.men+S.women)>t.seats){S.screen='booking';render();return;}
      const pi=root.querySelector('#promo-in'); if(pi)S.promoterCode=pi.value.toUpperCase().trim()||S.promoterCode;
      const m=bookingMath(t);
      const payments=splitPaymentsFor(t,v);
      const req={id,venue:v.name,vid:v.id,table:t.id,tier:t.tier,men:S.men,women:S.women,total:m.chargeTotal,subtotal:m.groupTotal,serviceFee:m.fee,paidNow:payments[0].amount,min:t.min,status:'pending',deadlineMs:Date.now()+20*60*1000,code:code(),who:'You',t:'just now',invited:S.splitPay?S.invited.slice():[],splitPay:S.splitPay,promo:S.promoterCode,payments};
      S.requests.unshift(req);
      sendPaymentPings(req);
      S.activeReq=id;S.screen='status';render();return;}
    if(to==='back-discover'){S.screen='home';S.tab='discover';render();return;}
    if(to==='venue'){S.screen='venue';render();return;}
    if(to==='booking'){S.screen='booking';render();return;}
    if(to==='pay'){const t=S.venueId&&S.selTable?tablesFor(S.venueId).find(x=>x.id===S.selTable):null; if(t&&(S.men+S.women)>t.seats){S.screen='booking';render();return;}}
    S.screen=to;render();
  }
  function decide(id,status){const r=S.requests.find(x=>x.id===id);if(!r)return;if(status==='confirmed'&&!allPaid(r))return;r.status=status;
    if(status==='confirmed'&&r.vid&&S.tables[r.vid]){const tt=S.tables[r.vid].find(x=>x.id===r.table);if(tt)tt.booked=true;}
    render();}
  function approveClub(id){const v=S.pendingClubs.find(x=>x.id===id);if(!v)return;v.status='live';v.when='This weekend';venues.push(v);S.pendingClubs=S.pendingClubs.filter(x=>x.id!==id);S.clubVenueId=id;render();}
  function send(){const i=root.querySelector('#msg-in');if(!i||!i.value.trim())return;const id=S.activeChat;
    (S.convos[id]=S.convos[id]||[]).push({f:'me',t:i.value.trim()});i.value='';render();
    setTimeout(()=>{const replies=['hahahaha','say lessss','booking it now','where you sitting?','pulling up'];
      (S.convos[id]=S.convos[id]||[]).push({f:'them',t:replies[Math.floor(Math.random()*replies.length)]});
      if(S.activeChat===id&&S.screen==='chat')render();},1300);}

  setInterval(()=>{
    if(refreshExpiries()){ render(); return; }
    updateTimerDisplays();
  },1000);
  render();
})();
</script>
